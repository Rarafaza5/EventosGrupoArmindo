<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin — Votação Profissional</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA8azNy6GEgD190y_fW91ahUbKa1w5veik",
    authDomain: "aawards.firebaseapp.com",
    databaseURL: "https://aawards-default-rtdb.firebaseio.com",
    projectId: "aawards",
    storageBucket: "aawards.firebasestorage.app",
    messagingSenderId: "839334918366",
    appId: "1:839334918366:web:454a259fa3e2665b46ea4f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let config = {};
  let candidates = [];
  const ADMIN_PASS = "admin1234";

  // ---- AUTH ----
  function checkAuth() {
    if (sessionStorage.getItem('admin_auth') === ADMIN_PASS) { showApp(); return; }
    document.getElementById('authWall').style.display = 'flex';
  }
  window.doLogin = function() {
    if (document.getElementById('passInput').value === ADMIN_PASS) {
      sessionStorage.setItem('admin_auth', ADMIN_PASS);
      location.reload();
    } else { alert("Senha incorreta"); }
  };

  function showApp() {
    document.getElementById('authWall').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    loadConfig();
  }

  function loadConfig() {
    onValue(ref(db, 'config'), (snap) => {
      config = snap.val() || {};
      candidates = config.candidates || [];
      renderCandidateList();
      updateToggleLabel(config.votingOpen);
    });
    onValue(ref(db, 'votes'), (snap) => {
      updateVoteCounts(snap.val() || {});
    });
  }

  // ---- CONTROL ----
  window.toggleVoting = async function() {
    const currentState = config.votingOpen || false;
    await set(ref(db, 'config/votingOpen'), !currentState);
    showToast(!currentState ? '✅ Votação Aberta!' : '🔒 Votação Fechada');
  };

  function updateToggleLabel(isOpen) {
    const btn = document.getElementById('votingToggleBtn');
    btn.textContent = isOpen ? 'FECHAR VOTAÇÃO' : 'ABRIR VOTAÇÃO';
    btn.className = isOpen ? 'btn btn-danger' : 'btn btn-success';
  }

  window.resetVotes = async function() {
    if (!confirm('Deseja apagar TODOS os votos? Isso permitirá que os utilizadores votem novamente.')) return;
    await set(ref(db, 'votes'), null);
    await set(ref(db, 'config/lastReset'), Date.now()); // SINAL DE RESET
    showToast('🗑 Votos apagados e sessões resetadas!');
  };

  // ---- CANDIDATES ----
  function renderCandidateList() {
    const list = document.getElementById('candidateList');
    list.innerHTML = candidates.map((c, i) => `
      <div class="candidate-item">
        <div class="c-info"><strong>${c.name}</strong><br><small>${c.subtitle || ''}</small></div>
        <div class="c-votes" id="votes_${c.id}">0 votos</div>
        <button class="btn-icon danger" onclick="removeCandidate(${i})">🗑</button>
      </div>
    `).join('');
  }

  function updateVoteCounts(votes) {
    let total = 0;
    candidates.forEach(c => {
      const count = votes[c.id] || 0;
      total += count;
      if(document.getElementById('votes_'+c.id)) document.getElementById('votes_'+c.id).textContent = count + ' votos';
    });
    document.getElementById('totalVotes').textContent = total;
  }

  window.saveCandidate = async function() {
    const name = document.getElementById('c_name').value;
    if(!name) return;
    const newC = { id: 'c_'+Date.now(), name, subtitle: document.getElementById('c_subtitle').value, photo: document.getElementById('c_photoB64').value };
    candidates.push(newC);
    await set(ref(db, 'config/candidates'), candidates);
    document.getElementById('candidateModal').classList.remove('show');
  };

  window.removeCandidate = async function(i) {
    candidates.splice(i, 1);
    await set(ref(db, 'config/candidates'), candidates);
  };

  window.handlePhotoUpload = function(input) {
    const reader = new FileReader();
    reader.onload = e => { document.getElementById('c_photoB64').value = e.target.result; };
    reader.readAsDataURL(input.files[0]);
  };

  function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000); }

  checkAuth();
</script>

<style>
  :root { --bg: #0f172a; --surface: #1e293b; --accent: #38bdf8; --text: #f8fafc; --border: #334155; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 20px; }
  .card { background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
  .btn { padding: 10px 20px; border-radius: 8px; cursor: pointer; border: none; font-weight: 600; }
  .btn-success { background: #22c55e; color: white; }
  .btn-danger { background: #ef4444; color: white; }
  .candidate-item { display: flex; align-items: center; gap: 15px; background: #0f172a; padding: 10px; border-radius: 8px; margin-bottom: 10px; }
  .c-info { flex: 1; }
  #authWall { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 100; }
  #toast { position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: #000; padding: 10px 20px; border-radius: 8px; transform: translateY(100px); transition: 0.3s; }
  #toast.show { transform: translateY(0); }
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
  .modal.show { display: flex; }
  .modal-content { background: var(--surface); padding: 30px; border-radius: 12px; width: 400px; }
  input { width: 100%; padding: 10px; margin: 10px 0; background: #0f172a; border: 1px solid var(--border); color: white; border-radius: 6px; }
</style>
</head>
<body>
  <div id="authWall">
    <div class="card" style="width: 300px; text-align: center;">
      <h2>Admin Login</h2>
      <input type="password" id="passInput" placeholder="Password"/>
      <button class="btn btn-success" onclick="doLogin()">Entrar</button>
    </div>
  </div>

  <div id="mainApp" style="display:none">
    <h1>Painel de Controlo</h1>
    <div class="card">
      <button id="votingToggleBtn" onclick="toggleVoting()">Carregando...</button>
      <button class="btn btn-danger" onclick="resetVotes()" style="margin-left: 10px;">LIMPAR VOTOS & RESET SESSÕES</button>
    </div>
    
    <div class="card">
      <h3>Candidatos (<span id="totalVotes">0</span> votos totais)</h3>
      <button class="btn btn-success" onclick="document.getElementById('candidateModal').classList.add('show')">+ Novo Candidato</button>
      <div id="candidateList" style="margin-top: 15px;"></div>
    </div>
  </div>

  <div class="modal" id="candidateModal">
    <div class="modal-content">
      <h3>Novo Candidato</h3>
      <input type="text" id="c_name" placeholder="Nome"/>
      <input type="text" id="c_subtitle" placeholder="Subtítulo"/>
      <input type="file" onchange="handlePhotoUpload(this)"/>
      <input type="hidden" id="c_photoB64"/>
      <button class="btn btn-success" onclick="saveCandidate()">Guardar</button>
      <button class="btn btn-danger" onclick="document.getElementById('candidateModal').classList.remove('show')">Cancelar</button>
    </div>
  </div>

  <div id="toast"></div>
</body>
</html>
