<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Votação Oficial</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&family=Outfit:wght@300;600&display=swap" rel="stylesheet"/>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA8azNy6GEgD190y_fW91ahUbKa1w5veik",
    authDomain: "aawards.firebaseapp.com",
    databaseURL: "https://aawards-default-rtdb.firebaseio.com",
    projectId: "aawards",
    storageBucket: "aawards.firebasestorage.app",
    messagingSenderId: "839334918366",
    appId: "1:839334918366:web:454a259fa3e2665b46ea4f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const VOTE_KEY = "user_vote_data";
  let hasVoted = false;
  let votingOpen = false;

  // Lógica de Sessão
  function getMyVote() {
    const data = localStorage.getItem(VOTE_KEY);
    return data ? JSON.parse(data) : null;
  }

  onValue(ref(db, 'config'), (snap) => {
    const data = snap.val();
    if (!data) return;

    const lastReset = data.lastReset || 0;
    const myVote = getMyVote();

    // RESET DE SESSÃO: Se houve reset após o meu voto, limpa
    if (myVote && myVote.time < lastReset) {
      localStorage.removeItem(VOTE_KEY);
      hasVoted = false;
    } else if (myVote) {
      hasVoted = true;
    }

    votingOpen = data.votingOpen || false;
    renderUI(data);
  });

  function renderUI(data) {
    document.getElementById('eventTitle').textContent = data.title || 'VOTAÇÃO';
    document.getElementById('closedScreen').style.display = votingOpen ? 'none' : 'flex';
    document.getElementById('votingScreen').style.display = votingOpen ? 'block' : 'none';

    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    
    (data.candidates || []).forEach(c => {
      const isMyVote = hasVoted && getMyVote().id === c.id;
      const card = document.createElement('div');
      card.className = `card ${isMyVote ? 'selected' : ''} ${hasVoted && !isMyVote ? 'disabled' : ''}`;
      card.innerHTML = `
        <div class="photo-wrap">
          ${c.photo ? `<img src="${c.photo}"/>` : `<div class="placeholder">${c.name[0]}</div>`}
          ${isMyVote ? '<div class="check">✓</div>' : ''}
        </div>
        <div class="name">${c.name}</div>
        <div class="sub">${c.subtitle || ''}</div>
        ${!hasVoted ? `<button class="btn-vote" onclick="castVote('${c.id}', '${c.name}')">VOTAR</button>` : ''}
      `;
      grid.appendChild(card);
    });
  }

  window.castVote = async function(id, name) {
    if (!confirm(`Confirmar voto em ${name}?`)) return;
    
    const vRef = ref(db, `votes/${id}`);
    const snap = await get(vRef);
    await set(vRef, (snap.exists() ? snap.val() : 0) + 1);
    
    localStorage.setItem(VOTE_KEY, JSON.stringify({ id, time: Date.now() }));
    location.reload();
  };
</script>

<style>
  :root { --accent: #c8a96e; --bg: #06050c; }
  body { background: var(--bg); color: white; font-family: 'Outfit', sans-serif; margin: 0; }
  .header { padding: 40px 20px; text-align: center; border-bottom: 1px solid rgba(200,169,110,0.2); }
  h1 { font-family: 'Cormorant Garamond', serif; font-size: 2.5rem; color: var(--accent); margin: 0; }
  
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 20px; }
  
  .card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; text-align: center; transition: 0.3s; }
  .card.selected { border-color: var(--accent); background: rgba(200,169,110,0.1); }
  .card.disabled { opacity: 0.5; pointer-events: none; }
  
  .photo-wrap { width: 100%; aspect-ratio: 1/1; border-radius: 10px; overflow: hidden; margin-bottom: 10px; position: relative; }
  .photo-wrap img { width: 100%; height: 100%; object-fit: cover; }
  .placeholder { width: 100%; height: 100%; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: var(--accent); }
  
  .check { position: absolute; top: 5px; right: 5px; background: var(--accent); color: black; width: 25px; height: 25px; border-radius: 50%; font-weight: bold; }
  
  .name { font-weight: 600; font-size: 1.1rem; }
  .sub { font-size: 0.8rem; color: var(--accent); opacity: 0.8; margin-bottom: 10px; }
  
  .btn-vote { background: transparent; border: 1px solid var(--accent); color: var(--accent); width: 100%; padding: 8px; border-radius: 5px; cursor: pointer; font-weight: 600; }
  .btn-vote:hover { background: var(--accent); color: black; }
  
  #closedScreen { height: 70vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .closed-icon { font-size: 4rem; margin-bottom: 20px; }
</style>
</head>
<body>
  <div class="header">
    <h1 id="eventTitle">...</h1>
  </div>

  <div id="closedScreen" style="display:none">
    <div class="closed-icon">🔒</div>
    <h2>Votação Encerrada</h2>
    <p>Aguarde pelo início da próxima ronda.</p>
  </div>

  <div id="votingScreen" style="display:none">
    <div class="grid" id="grid"></div>
  </div>
</body>
</html>
