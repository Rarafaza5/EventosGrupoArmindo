<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Broadcast — Grupo Armindo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Jost:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script>
    function scaleObs() {
      const el = document.getElementById('scaleRoot'); if (!el) return;
      const sx = window.innerWidth / 1920, sy = window.innerHeight / 1080, s = Math.min(sx, sy);
      el.style.transform = `scale(${s})`;
      el.style.left = ((window.innerWidth - 1920 * s) / 2) + 'px';
      el.style.top = ((window.innerHeight - 1080 * s) / 2) + 'px';
    }
    window.addEventListener('DOMContentLoaded', scaleObs);
    window.addEventListener('resize', scaleObs);
  </script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    const db = getDatabase(initializeApp({ apiKey: "AIzaSyA8azNy6GEgD190y_fW91ahUbKa1w5veik", authDomain: "aawards.firebaseapp.com", databaseURL: "https://aawards-default-rtdb.firebaseio.com", projectId: "aawards", storageBucket: "aawards.firebasestorage.app", messagingSenderId: "839334918366", appId: "1:839334918366:web:454a259fa3e2665b46ea4f" }));
    let cfg = null, vts = {}, pTot = {}, vFTO = null, lcTO = null, prevLeader = '', prevCatId = null, winnerShown = false;
    let connectionOk = true;
    let lastConfetti=0, lastWinner=0, lastClosed=0;

    /* ── CLOCK ── */
    function startClock() {
      const tick = () => { const n = new Date(); const t = [n.getHours(), n.getMinutes(), n.getSeconds()].map(v => String(v).padStart(2, '0')).join(':'); document.querySelectorAll('.bc-clock').forEach(el => el.textContent = t); };
      tick(); setInterval(tick, 1000);
    }

    /* ── ANIMATED COUNTER ── */
    function animCount(el, from, to, ms = 1000) {
      if (!el || from === to) return; const start = performance.now();
      (function step(now) {
        const p = Math.min((now - start) / ms, 1), e = 1 - Math.pow(1 - p, 4);
        el.textContent = Math.round(from + (to - from) * e).toLocaleString('pt-PT');
        if (p < 1) requestAnimationFrame(step); else el.textContent = to.toLocaleString('pt-PT');
      })(performance.now());
    }

    /* ── LUMINANCE GUARD (prevents bright themes from blowing out OBS) ── */
    function perceivedLum(hex) {
      hex = (hex || '#07060e').replace('#','').padEnd(6,'0');
      const r = parseInt(hex.slice(0,2),16)/255, g = parseInt(hex.slice(2,4),16)/255, b = parseInt(hex.slice(4,6),16)/255;
      return 0.299*r + 0.587*g + 0.114*b;
    }
    function enforceDark(hex, maxLum = 0.12) {
      if (!hex || !hex.startsWith('#')) return '#07060e';
      const lum = perceivedLum(hex);
      if (lum <= maxLum) return hex;
      const f = maxLum / lum;
      const hx = hex.replace('#','').padEnd(6,'0');
      const r = Math.round(parseInt(hx.slice(0,2),16)*f);
      const g = Math.round(parseInt(hx.slice(2,4),16)*f);
      const b = Math.round(parseInt(hx.slice(4,6),16)*f);
      return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
    }

    /* ── THEME ── */
    function applyTheme(t) {
      if (!t) return; const r = document.documentElement;
      r.style.setProperty('--acc', t.accent || '#c4973a');
      r.style.setProperty('--acc2', t.accent2 || '#e8d5a3');
      const safeBg = enforceDark(t.bg || '#07060e');
      r.style.setProperty('--bg', safeBg);
      document.body.style.background = safeBg;
      r.style.setProperty('--surface', enforceDark(t.surface || '#0d0c1a', 0.18));
      r.style.setProperty('--cardBg', enforceDark(t.cardBg || '#0e0d1c', 0.16));
      r.style.setProperty('--text', t.text || '#ede9e0');
      buildAurora();
    }

    /* ── AURORA CANVAS ── */
    let auroraCtx = null, auroraT = 0, stars = [];
    function buildAurora() {
      const c = document.getElementById('auroraCanvas'); if (!c) return;
      if (!auroraCtx) {
        auroraCtx = c.getContext('2d'); c.width = 1920; c.height = 1080;
        stars = Array.from({ length: 220 }, () => ({ x: Math.random() * 1920, y: Math.random() * 1080, r: Math.random() * 1.6 + .2, a: Math.random() * .5 + .05, da: (Math.random() - .5) * .004, vx: (Math.random() - .5) * .06, vy: (Math.random() - .5) * .04 }));
        (function loop() {
          auroraT += .005;
          const style = getComputedStyle(document.documentElement);
          const acc = style.getPropertyValue('--acc').trim() || '#c4973a';
          const bgColor = style.getPropertyValue('--bg').trim() || '#07060e';
          // Always fill with the (already-clamped-dark) bg — canvas is self-contained
          auroraCtx.globalAlpha = 1;
          auroraCtx.fillStyle = bgColor;
          auroraCtx.fillRect(0, 0, 1920, 1080);
          // Parse accent hex to rgb
          const hx = acc.replace('#', '').padEnd(6,'0');
          const ar = parseInt(hx.substring(0, 2), 16), ag = parseInt(hx.substring(2, 4), 16), ab = parseInt(hx.substring(4, 6), 16);
          for (let layer = 0; layer < 4; layer++) {
            const phase = auroraT + layer * 1.4;
            const yBase = 180 + layer * 100 + Math.sin(phase * .6) * 70;
            const grad = auroraCtx.createLinearGradient(0, yBase - 140, 0, yBase + 140);
            const alpha = [.055, .04, .03, .02][layer];
            grad.addColorStop(0, 'transparent');
            grad.addColorStop(.35, `rgba(${ar},${ag},${ab},${alpha})`);
            grad.addColorStop(.65, `rgba(${Math.min(ar + 20, 255)},${ag},${Math.min(ab + 30, 255)},${alpha * .7})`);
            grad.addColorStop(1, 'transparent');
            auroraCtx.beginPath(); auroraCtx.moveTo(0, yBase);
            for (let x = 0; x <= 1920; x += 6) { const y = yBase + Math.sin(x * .0025 + phase) * 60 + Math.sin(x * .006 + phase * 1.4) * 28; auroraCtx.lineTo(x, y); }
            auroraCtx.lineTo(1920, 1080); auroraCtx.lineTo(0, 1080); auroraCtx.closePath();
            auroraCtx.fillStyle = grad; auroraCtx.fill();
          }
          stars.forEach(s => {
            s.x += s.vx; s.y += s.vy; s.a += s.da;
            if (s.a < .03 || s.a > .65) s.da *= -1;
            if (s.x < -2) s.x = 1922; if (s.x > 1922) s.x = -2; if (s.y < -2) s.y = 1082; if (s.y > 1082) s.y = -2;
            auroraCtx.beginPath(); auroraCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            auroraCtx.fillStyle = acc; auroraCtx.globalAlpha = s.a * 0.4; auroraCtx.fill();
          });
          auroraCtx.globalAlpha = 1;
          requestAnimationFrame(loop);
        })();
      }
    }

    /* ── PARTICLES ── */
    function spawnParticles(n = 40, x0 = null) {
      const layer = document.getElementById('partLayer');
      const cols = ['var(--acc)', 'var(--acc2)', '#fff8e0', '#ffffff', 'rgba(255,255,255,.6)'];
      for (let i = 0; i < n; i++) {
        const p = document.createElement('div'); p.className = 'part';
        const c = cols[Math.floor(Math.random() * cols.length)];
        const x = x0 != null ? x0 + (Math.random() - .5) * 200 : Math.random() * 1920;
        const dur = Math.random() * 2 + 1, drift = (Math.random() - .5) * 400, sz = Math.random() * 11 + 3;
        p.style.cssText = `left:${x}px;bottom:0;width:${sz}px;height:${sz}px;background:${c};border-radius:${Math.random() > .4 ? '50%' : '3px'};animation:partRise ${dur}s ease-out forwards;--d:${drift}px;animation-delay:${Math.random() * .6}s`;
        layer.appendChild(p); setTimeout(() => p.remove(), (dur + 1) * 1000);
      }
    }

    /* ── VOTE FLASH ── */
    function flashVote() {
      const el = document.getElementById('voteFlash'); if (!el) return;
      el.classList.add('active'); clearTimeout(vFTO);
      vFTO = setTimeout(() => el.classList.remove('active'), 800);
      // Ripple on total counter
      const tc = document.getElementById('totalCount');
      if (tc) { tc.classList.remove('count-pop'); void tc.offsetWidth; tc.classList.add('count-pop'); }
    }

    /* ── LEADER CHANGE BANNER ── */
    function showLeaderBanner(name, cat) {
      const b = document.getElementById('leaderBanner'); if (!b) return;
      b.querySelector('.lcb-name').textContent = name;
      b.querySelector('.lcb-cat').textContent = cat || '';
      b.classList.remove('show');
      void b.offsetWidth;
      b.classList.add('show'); clearTimeout(lcTO);
      lcTO = setTimeout(() => b.classList.remove('show'), 6000);
      spawnParticles(70);
      // Spotlight pulse
      triggerSpotlight();
    }

    /* ── SPOTLIGHT PULSE ── */
    function triggerSpotlight() {
      const sp = document.getElementById('spotlightLayer');
      if (!sp) return;
      sp.classList.remove('active');
      void sp.offsetWidth;
      sp.classList.add('active');
      setTimeout(() => sp.classList.remove('active'), 2200);
    }

    /* ── WINNER REVEAL ── */
    function showWinnerReveal(name, subtitle, pct, catName) {
      const ov = document.getElementById('winnerOverlay');
      if (!ov) return;
      ov.querySelector('.wo-name').textContent = name;
      ov.querySelector('.wo-subtitle').textContent = subtitle || '';
      ov.querySelector('.wo-pct').textContent = pct + '%';
      ov.querySelector('.wo-cat').textContent = catName || '';
      ov.classList.remove('show');
      void ov.offsetWidth;
      ov.classList.add('show');
      spawnParticles(120);
      triggerSpotlight();
      setTimeout(() => ov.classList.remove('show'), 8000);
    }

    /* ── CATEGORY WIPE TRANSITION ── */
    function triggerCategoryWipe(cb) {
      const wipe = document.getElementById('categoryWipe');
      if (!wipe) { cb && cb(); return; }
      wipe.classList.add('active');
      setTimeout(() => { cb && cb(); }, 350);
      setTimeout(() => wipe.classList.remove('active'), 900);
    }

    /* ── CONNECTION STATUS ── */
    function setConnectionStatus(ok) {
      connectionOk = ok;
      const dot = document.getElementById('connDot');
      if (dot) dot.className = 'conn-dot ' + (ok ? 'ok' : 'err');
    }

    /* ── RESOLVE CAT ── */
    function resolveCat(config, votes, catId) {
      const sid = config.sessionId || 'default', sv = votes[sid] || {};
      if (config.categories && config.categories.length > 0) {
        const cat = config.categories.find(c => c.id === catId) || config.categories[0];
        const cv = sv['cat_' + cat.id] || {};
        return { cat, cands: [...(cat.candidates || [])].map(c => ({ ...c, count: cv[c.id] || 0 })).sort((a, b) => b.count - a.count), total: Object.values(cv).reduce((s, v) => s + v, 0) };
      }
      const lv = sv.votes || {};
      return { cat: { id: 'default', name: config.title || 'Votação' }, cands: [...(config.candidates || [])].map(c => ({ ...c, count: lv[c.id] || 0 })).sort((a, b) => b.count - a.count), total: Object.values(lv).reduce((s, v) => s + v, 0) };
    }

    /* ── MAIN RENDER ── */
    function render(config, votes) {
      if (!config) return;
      applyTheme(config.theme);
      const bc = config.broadcast || {};
      const catId = bc.catId || config.activeCategory || config.categories?.[0]?.id || 'default';
      
      // Suspense toggle
      if (bc.suspense) {
        document.getElementById('scaleRoot').classList.add('suspense');
      } else {
        document.getElementById('scaleRoot').classList.remove('suspense');
      }

      // Category change wipe
      const catChanged = prevCatId !== null && prevCatId !== catId;
      prevCatId = catId;

      const { cat, cands, total } = resolveCat(config, votes, catId);
      const catLabel = bc.customLabel || cat.name;

      // VFX Triggers (Manual Override)
      if (bc.trigger_confetti && bc.trigger_confetti > lastConfetti) {
        lastConfetti = bc.trigger_confetti;
        confetti({ particleCount: 200, spread: 140, origin: { y: 0.1 }, zIndex: 9999, colors: ['#c4973a','#e8d5a3','#ffffff'] });
      }
      if (bc.trigger_winner && bc.trigger_winner > lastWinner) {
        lastWinner = bc.trigger_winner;
        if (cands.length > 0) {
          const pct = total > 0 ? (cands[0].count / total * 100).toFixed(1) : 0;
          showWinnerReveal(cands[0].name, cands[0].subtitle || '', pct, catLabel);
        }
      }
      if (bc.trigger_closed && bc.trigger_closed > lastClosed) {
        lastClosed = bc.trigger_closed;
        const ov = document.createElement('div');
        ov.className = 'closed-stamp';
        ov.innerHTML = '<div class="c-stamp-text">VOTAÇÃO ENCERRADA</div>';
        document.getElementById('scaleRoot').appendChild(ov);
        setTimeout(() => ov.classList.add('show'), 100);
        setTimeout(() => { ov.classList.remove('show'); setTimeout(()=>ov.remove(), 1000); }, 6000);
      }

      const isOpen = config.votingOpen || false;
      const revealed = Math.min(bc.revealed ?? 0, cands.length);
      const showSpoke = bc.showSpokesperson !== false;
      const layout = bc.layout || 'split';
      const rowStyle = bc.rowStyle || 'card';
      const showPhotos = bc.showPhotos !== false;
      const showBars = bc.showBars !== false;
      const showPct = bc.showPct !== false;
      const showCount = bc.showCount !== false;
      const showLive = bc.showLiveVotes !== false;
      const showClock = bc.showClock !== false;
      const showStatus = bc.showStatus !== false;
      const eyebrowText = bc.eyebrowText || 'Resultados em Tempo Real';
      const footerText = bc.footerText || 'vote.grupoarmindo.me';

      // Flash & leader detection
      const prevT = pTot[cat.id] || 0;
      if (total > prevT && revealed >= cands.length) flashVote();
      pTot[cat.id] = total;
      if (cands.length > 0 && cands[0].count > 0) {
        const ldr = cands[0].name;
        if (prevLeader && prevLeader !== ldr) { showLeaderBanner(ldr, cat.name); winnerShown = false; }
        prevLeader = ldr;
      }

      // Winner reveal: triggered when 1st place (last in reveal order) is newly revealed
      const prevRevealedCount = parseInt(document.getElementById('bc_prev_revealed')?.value || '0');
      const isFirstReveal = revealed > prevRevealedCount && revealed === cands.length;
      if (document.getElementById('bc_prev_revealed')) document.getElementById('bc_prev_revealed').value = revealed;
      if (isFirstReveal && !winnerShown && cands.length > 0 && cands[0].count > 0) {
        winnerShown = true;
        const pct = total > 0 ? (cands[0].count / total * 100).toFixed(1) : 0;
        setTimeout(() => showWinnerReveal(cands[0].name, cands[0].subtitle || '', pct, catLabel), 600);
      }

      // Header updates (immediate, not gated behind wipe)
      document.getElementById('bcTitle').textContent = config.title || 'VOTAÇÃO';
      document.getElementById('bcEyebrow').textContent = eyebrowText;
      document.getElementById('liveDot').className = 'live-dot' + (isOpen ? ' on' : ' off');
      const stag = document.getElementById('statusTag');
      stag.textContent = isOpen ? 'AO VIVO' : 'ENCERRADO'; stag.className = 'status-tag' + (isOpen ? ' live' : '');

      // Total
      if (showLive) { animCount(document.getElementById('totalCount'), pTot['__d'] || 0, total); pTot['__d'] = total; document.getElementById('totalBox').style.display = 'flex'; }
      else document.getElementById('totalBox').style.display = 'none';

      // Clock
      document.querySelectorAll('.bc-clock-wrap').forEach(el => el.style.display = showClock ? '' : 'none');
      // Status
      document.getElementById('statusTag').style.display = showStatus ? '' : 'none';
      document.getElementById('liveDot').style.display = showStatus ? '' : 'none';

      // Footer
      document.getElementById('bbUrl').textContent = footerText;

      // Layout
      const stage = document.getElementById('mainStage');
      stage.className = 'stage layout-' + layout;

      // Spoke
      const sa = document.getElementById('spokeArea');
      sa.style.display = (showSpoke && layout !== 'full') ? 'flex' : 'none';
      const sn = bc.spokespersonName || '', sr = bc.spokespersonRole || '';
      document.getElementById('spokeName').textContent = sn;
      document.getElementById('spokeRole').textContent = sr;
      document.getElementById('spokeNameplate').style.display = (sn || sr) ? 'flex' : 'none';

      // Category label + rows — with wipe if category changed
      const doRender = () => {
        document.getElementById('bcCatLabel').textContent = catLabel;
        document.getElementById('bbMid').textContent = catLabel;
        if (catChanged) winnerShown = false;
        renderRows(cands, total, revealed, bc.highlightLeader !== false, rowStyle, showPhotos, showBars, showPct, showCount);
      };
      if (catChanged) {
        triggerCategoryWipe(doRender);
      } else {
        doRender();
      }
    }

    function renderRows(cands, total, revealed, hlLeader, style, showPhotos, showBars, showPct, showCount) {
      const container = document.getElementById('rowsContainer');
      const prevShown = container.querySelectorAll('.bc-row:not(.bc-row--hidden)').length;
      const newReveal = revealed > prevShown;
      container.innerHTML = '';
      container.className = 'rows-container style-' + style;
      const rev = [...cands].reverse();
      rev.forEach((c, idx) => {
        const rank = cands.length - idx, pct = total > 0 ? (c.count / total * 100).toFixed(1) : 0;
        const isShown = idx < revealed, isLeader = rank === 1 && hlLeader && c.count > 0;
        const isNew = isShown && idx === revealed - 1 && newReveal;
        const row = document.createElement('div');
        row.className = 'bc-row style-' + style + (isLeader ? ' bc-row--leader' : '') + (!isShown ? ' bc-row--hidden' : '') + (isNew ? ' bc-row--new' : '');
        row.style.setProperty('--ri', idx);
        if (style === 'flag') {
          row.innerHTML = `
            <div class="bc-row-flag-num">${isLeader ? '◆' : String(rank).padStart(2, '0')}</div>
            ${showPhotos ? `<div class="bc-row-flag-photo">${c.photo ? `<img src="${c.photo}" alt="${c.name}"/>` : `<div class="bc-initial">${c.name.charAt(0)}</div>`}</div>` : ''}
            <div class="bc-row-flag-body">
              <div class="bc-row-flag-name">${c.name}${c.subtitle ? `<span class="bc-row-flag-sub"> · ${c.subtitle}</span>` : ''}</div>
              ${showBars ? `<div class="bc-row-bar"><div class="bc-row-fill" data-pct="${pct}" style="width:0%"></div></div>` : ''}
            </div>
            <div class="bc-row-flag-score">
              ${showCount ? `<div class="bc-row-count">${c.count.toLocaleString('pt-PT')}</div>` : ''}
              ${showPct ? `<div class="bc-row-pct">${pct}%</div>` : ''}
            </div>`;
        } else if (style === 'line') {
          row.innerHTML = `
            <div class="bc-row-rank">${isLeader ? '◆' : String(rank).padStart(2, '0')}</div>
            ${showPhotos ? `<div class="bc-row-photo">${c.photo ? `<img src="${c.photo}" alt="${c.name}"/>` : `<div class="bc-initial">${c.name.charAt(0)}</div>`}</div>` : ''}
            <div class="bc-row-name-inline">${c.name}${c.subtitle ? `<span class="bc-row-sub-inline"> ${c.subtitle}</span>` : ''}</div>
            <div class="bc-row-line-fill-wrap">${showBars ? `<div class="bc-row-line-fill" data-pct="${pct}" style="width:0%"></div>` : ''}</div>
            ${showCount ? `<div class="bc-row-count-inline">${c.count.toLocaleString('pt-PT')}</div>` : ''}
            ${showPct ? `<div class="bc-row-pct-inline">${pct}%</div>` : ''}`;
        } else {
          // card (default)
          row.innerHTML = `
            <div class="bc-row-rank">${isLeader ? '◆' : String(rank).padStart(2, '0')}</div>
            ${showPhotos ? `<div class="bc-row-photo">${c.photo ? `<img src="${c.photo}" alt="${c.name}"/>` : `<div class="bc-initial">${c.name.charAt(0)}</div>`}</div>` : ''}
            <div class="bc-row-info">
              <div class="bc-row-name">${c.name}</div>
              ${c.subtitle ? `<div class="bc-row-sub">${c.subtitle}</div>` : ''}
              ${showBars ? `<div class="bc-row-bar"><div class="bc-row-fill" data-pct="${pct}" style="width:0%"></div></div>` : ''}
            </div>
            <div class="bc-row-score">
              ${showCount ? `<div class="bc-row-count">${c.count.toLocaleString('pt-PT')}</div>` : ''}
              ${showPct ? `<div class="bc-row-pct">${pct}%</div>` : ''}
            </div>`;
        }
        container.appendChild(row);
        if (isShown) setTimeout(() => { const b = row.querySelector('.bc-row-fill,.bc-row-line-fill'); if (b) b.style.width = pct + '%'; }, 80);
        if (isNew && isLeader) setTimeout(() => spawnParticles(55), 250);
      });
    }

    onValue(ref(db, 'config'), snap => { cfg = snap.val() || {}; render(cfg, vts); setConnectionStatus(true); },
      err => setConnectionStatus(false));
    onValue(ref(db, 'sessions'), snap => { vts = snap.val() || {}; if (cfg) render(cfg, vts); setConnectionStatus(true); },
      err => setConnectionStatus(false));
    document.addEventListener('DOMContentLoaded', () => { startClock(); buildAurora(); });
  </script>
  <style>
    :root {
      --acc: #c4973a;
      --acc2: #e8d5a3;
      --bg: #07060e;
      --surface: #0d0c1a;
      --cardBg: #0e0d1c;
      --text: #ede9e0;
    }

    /* ── COUNT POP ── */
    @keyframes countPop {
      0% { transform: scale(1); }
      40% { transform: scale(1.28); color: var(--acc2); }
      100% { transform: scale(1); }
    }
    .count-pop { animation: countPop .5s cubic-bezier(0.34,1.56,0.64,1) both; }

    /* ── CONNECTION DOT ── */
    .conn-dot {
      position: absolute;
      bottom: 28px;
      right: 60px;
      width: 8px; height: 8px;
      border-radius: 50%;
      z-index: 20;
      transition: background .4s;
    }
    .conn-dot.ok { background: #4fdb82; box-shadow: 0 0 6px #4fdb8280; }
    .conn-dot.err { background: #e05050; animation: connBlink 1s ease infinite; }
    @keyframes connBlink { 50% { opacity: .3; } }

    /* ── SPOTLIGHT LAYER ── */
    #spotlightLayer {
      position: absolute;
      inset: 0;
      z-index: 6;
      pointer-events: none;
      opacity: 0;
      transition: opacity .3s;
      background:
        radial-gradient(ellipse 40% 90% at 28% 0%, rgba(255,210,90,0.09) 0%, transparent 65%),
        radial-gradient(ellipse 40% 90% at 72% 0%, rgba(255,230,140,0.06) 0%, transparent 65%);
      /* No mix-blend-mode: keeps it contained and safe for all themes */
    }
    #spotlightLayer.active {
      opacity: 1;
      transition: opacity .12s;
      animation: spFlicker 2.2s ease-out forwards;
    }
    @keyframes spFlicker {
      0%   { opacity: 0; }
      8%   { opacity: 1; }
      20%  { opacity: .7; }
      35%  { opacity: 1; }
      60%  { opacity: .8; }
      100% { opacity: 0; }
    }

    /* ── CATEGORY WIPE ── */
    #categoryWipe {
      position: absolute;
      inset: 0;
      z-index: 30;
      pointer-events: none;
      background: linear-gradient(90deg, var(--bg), color-mix(in srgb, var(--acc) 8%, var(--bg)));
      transform: translateX(-102%);
      transition: transform .35s cubic-bezier(0.76,0,0.24,1);
    }
    #categoryWipe.active {
      transform: translateX(0);
      transition: transform .35s cubic-bezier(0.76,0,0.24,1);
    }
    #categoryWipe.active.done {
      transform: translateX(102%);
      transition: transform .4s cubic-bezier(0.76,0,0.24,1) .18s;
    }

    /* ── WINNER OVERLAY ── */
    #winnerOverlay {
      position: absolute;
      inset: 0;
      z-index: 60;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      opacity: 0;
      background: radial-gradient(ellipse 100% 100% at 50% 50%, rgba(6, 5, 12, 0.4) 0%, rgba(6, 5, 12, 0.95) 100%);
      backdrop-filter: blur(0px);
      transition: opacity .8s cubic-bezier(0.22,1,0.36,1);
    }
    #winnerOverlay.show {
      opacity: 1;
      backdrop-filter: blur(45px);
      -webkit-backdrop-filter: blur(45px);
    }
    #winnerOverlay.show .wo-card {
      animation: woCardIn .8s .15s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes woCardIn {
      from { opacity:0; transform: scale(.88) translateY(40px); }
      to   { opacity:1; transform: none; }
    }
    .wo-eyebrow {
      font-family: 'Cinzel', serif;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .4em;
      text-transform: uppercase;
      color: var(--acc);
      margin-bottom: 12px;
      opacity: 0;
    }
    #winnerOverlay.show .wo-eyebrow {
      animation: woFadeUp .6s .05s ease both;
    }
    @keyframes woFadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:none} }
    .wo-card {
      background: color-mix(in srgb, var(--cardBg) 88%, transparent);
      border: 1px solid var(--acc);
      border-radius: 24px;
      padding: 52px 80px;
      text-align: center;
      position: relative;
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--acc2) 15%, transparent),
        0 0 80px color-mix(in srgb, var(--acc) 22%, transparent),
        0 0 160px color-mix(in srgb, var(--acc) 10%, transparent);
      backdrop-filter: blur(32px);
    }
    .wo-card::before {
      content: '';
      position: absolute;
      top: -2px; left: 10%; right: 10%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--acc2), var(--acc), var(--acc2), transparent);
      border-radius: 2px;
      animation: woShine 3s ease-in-out infinite;
    }
    @keyframes woShine {
      0%,100% { opacity:.6; }
      50% { opacity:1; filter: drop-shadow(0 0 8px var(--acc)); }
    }
    .wo-crown {
      font-size: 3.8rem;
      line-height: 1;
      margin-bottom: 8px;
      animation: woCrown 1.2s .3s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes woCrown {
      from { opacity:0; transform:scale(.4) rotate(-20deg); }
      to   { opacity:1; transform:none; }
    }
    .wo-name {
      font-family: 'Cinzel', serif;
      font-size: 6.5rem;
      font-weight: 900;
      letter-spacing: .06em;
      color: #ffffff;
      line-height: 1.1;
      text-shadow: 0 0 80px var(--acc), 0 10px 30px rgba(0,0,0,0.8);
    }
    .wo-subtitle {
      font-size: 1.1rem;
      letter-spacing: .14em;
      color: var(--acc);
      opacity: .8;
      margin-top: 6px;
    }
    .wo-stats {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      margin-top: 22px;
      padding-top: 22px;
      border-top: 1px solid color-mix(in srgb, var(--acc) 20%, transparent);
    }
    .wo-pct-wrap { text-align: center; }
    .wo-pct {
      font-family: 'Cinzel', serif;
      font-size: 2.8rem;
      font-weight: 900;
      color: var(--acc);
      line-height: 1;
    }
    .wo-pct-label {
      font-size: .62rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--text) 40%, transparent);
      margin-top: 4px;
    }
    .wo-cat {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--text) 38%, transparent);
      margin-top: 18px;
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: 'Jost', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SCALE ROOT ── */
    #scaleRoot {
      position: fixed;
      top: 0;
      left: 0;
      width: 1920px;
      height: 1080px;
      transform-origin: top left;
      overflow: hidden;
      background: var(--bg);
      transition: filter 0.8s;
    }

    #scaleRoot.suspense::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 99;
      box-shadow: inset 0 0 160px rgba(180, 20, 20, 0.6);
      animation: heartbeat 1.4s infinite ease-in-out;
    }
    @keyframes heartbeat {
      0% { box-shadow: inset 0 0 140px rgba(180, 20, 20, 0.3); }
      15% { box-shadow: inset 0 0 250px rgba(220, 30, 30, 0.7); }
      30% { box-shadow: inset 0 0 160px rgba(180, 20, 20, 0.4); }
      45% { box-shadow: inset 0 0 220px rgba(200, 30, 30, 0.6); }
      100% { box-shadow: inset 0 0 140px rgba(180, 20, 20, 0.3); }
    }

    /* ── AURORA ── */
    #auroraCanvas {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── BG LAYERS ── */
    .bg-vig {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse 130% 115% at 50% 50%, transparent 28%, rgba(0, 0, 0, .75)100%);
    }

    .bg-scan {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: .55;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0, 0, 0, .018) 3px, rgba(0, 0, 0, .018) 4px);
    }

    /* Top accent bar */
    .top-accent {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      z-index: 10;
      background: linear-gradient(90deg, transparent 0%, color-mix(in srgb, var(--acc) 40%, transparent)8%, var(--acc)32%, var(--acc2)50%, var(--acc)68%, color-mix(in srgb, var(--acc) 40%, transparent)92%, transparent 100%);
      animation: tla 6s ease-in-out infinite alternate;
      box-shadow: 0 0 20px color-mix(in srgb, var(--acc) 40%, transparent);
    }

    @keyframes tla {
      0% {
        opacity: .5;
        filter: blur(0)
      }

      50% {
        opacity: 1;
        filter: blur(.8px)
      }

      100% {
        opacity: .55;
        filter: blur(0)
      }
    }

    /* Corners */
    .brk {
      position: absolute;
      z-index: 9;
      width: 50px;
      height: 50px;
    }

    .brk-tl {
      top: 24px;
      left: 24px;
      border-top: 1.5px solid color-mix(in srgb, var(--acc) 50%, transparent);
      border-left: 1.5px solid color-mix(in srgb, var(--acc) 50%, transparent);
    }

    .brk-tr {
      top: 24px;
      right: 24px;
      border-top: 1.5px solid color-mix(in srgb, var(--acc) 50%, transparent);
      border-right: 1.5px solid color-mix(in srgb, var(--acc) 50%, transparent);
    }

    .brk-bl {
      bottom: 24px;
      left: 24px;
      border-bottom: 1.5px solid color-mix(in srgb, var(--acc) 50%, transparent);
      border-left: 1.5px solid color-mix(in srgb, var(--acc) 50%, transparent);
    }

    .brk-br {
      bottom: 24px;
      right: 24px;
      border-bottom: 1.5px solid color-mix(in srgb, var(--acc) 50%, transparent);
      border-right: 1.5px solid color-mix(in srgb, var(--acc) 50%, transparent);
    }

    /* FX */
    #voteFlash {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      background: radial-gradient(ellipse 90% 90% at 35% 50%, color-mix(in srgb, var(--acc) 10%, transparent), transparent);
      opacity: 0;
      transition: opacity .07s;
    }

    #voteFlash.active {
      opacity: 1;
      transition: opacity 0s;
    }

    #partLayer {
      position: absolute;
      inset: 0;
      z-index: 9;
      pointer-events: none;
      overflow: hidden;
    }

    .part {
      position: absolute;
      will-change: transform, opacity;
    }

    @keyframes partRise {
      0% {
        transform: translateY(0) translateX(0) rotate(0);
        opacity: 1
      }

      60% {
        opacity: .9
      }

      100% {
        transform: translateY(-80vh) translateX(var(--d)) rotate(750deg);
        opacity: 0
      }
    }

    #stageRim {
      position: absolute;
      inset: 20px;
      z-index: 5;
      pointer-events: none;
      border: 2px solid transparent;
      border-radius: 24px;
      box-shadow: 0 0 48px color-mix(in srgb, var(--acc) 25%, transparent), inset 0 0 30px color-mix(in srgb, var(--acc2) 40%, transparent);
      background-clip: border-box;
      background-image: conic-gradient(from 1turn, var(--acc) 0%, var(--acc2) 34%, #fff 68%, var(--acc) 100%);
      animation: rimPulse 8s ease-in-out infinite;
      opacity: .95;
    }

    @keyframes rimPulse {
      0%, 100% { transform: scale(1) rotate(0deg); filter: brightness(1); }
      50% { transform: scale(1.01) rotate(0.26deg); filter: brightness(1.18); }
    }

    /* ── LEADER BANNER ── */
    #leaderBanner {
      position: absolute;
      top: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      z-index: 50;
      pointer-events: none;
      background: color-mix(in srgb, var(--cardBg) 92%, transparent);
      border: 1px solid var(--acc);
      border-radius: 14px;
      padding: 22px 52px;
      text-align: center;
      opacity: 0;
      transition: all .55s cubic-bezier(0.22, 1, 0.36, 1);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      box-shadow: 0 0 60px color-mix(in srgb, var(--acc) 14%, transparent), 0 0 0 1px color-mix(in srgb, var(--acc) 20%, transparent);
    }

    #leaderBanner.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .lcb-eyebrow {
      font-size: .58rem;
      font-weight: 700;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--acc);
      margin-bottom: 6px;
    }

    .lcb-headline {
      font-size: .72rem;
      letter-spacing: .14em;
      color: color-mix(in srgb, var(--text) 50%, transparent);
      margin-bottom: 8px;
    }

    .lcb-name {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--text);
      letter-spacing: .06em;
    }

    .lcb-cat {
      font-size: .65rem;
      color: var(--acc);
      letter-spacing: .14em;
      text-transform: uppercase;
      margin-top: 5px;
      opacity: .75;
    }

    /* ── STAGE ── */
    .stage {
      position: absolute;
      inset: 0;
      z-index: 5;
    }

    /* ── LAYOUT MODIFIERS (REMOVED) ── */
    /* Handled purely by absolute floating layout now */

    /* ── TOPBAR ── */
    .topbar {
      position: absolute;
      top: 40px;
      left: 60px;
      right: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: none;
      border: none;
      z-index: 10;
    }

    .tb-l {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .tb-brand {
      font-family: 'Cinzel', serif;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--acc);
      opacity: .88;
    }

    .tb-pipe {
      width: 1px;
      height: 22px;
      background: color-mix(in srgb, var(--acc) 18%, transparent);
    }

    #bcTitle {
      font-family: 'Cinzel', serif;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--text);
      opacity: .75;
    }

    .tb-r {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    #totalBox {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .tb-tn {
      font-family: 'Cinzel', serif;
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--acc);
      line-height: 1;
    }

    .tb-tl {
      font-size: .56rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--text) 36%, transparent);
    }

    .live-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--text) 20%, transparent);
      flex-shrink: 0;
      transition: background .5s;
    }

    .live-dot.on {
      background: #4fdb82;
      box-shadow: 0 0 0 4px color-mix(in srgb, #4fdb82 16%, transparent);
      animation: dp 2.5s ease infinite;
    }

    .live-dot.off {
      background: #e05050;
    }

    @keyframes dp {

      0%,
      100% {
        box-shadow: 0 0 0 3px color-mix(in srgb, #4fdb82 16%, transparent)
      }

      50% {
        box-shadow: 0 0 0 9px color-mix(in srgb, #4fdb82 0%, transparent)
      }
    }

    .status-tag {
      font-family: 'Cinzel', serif;
      font-size: .58rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      padding: 5px 13px;
      border-radius: 100px;
      background: color-mix(in srgb, var(--text) 5%, transparent);
      color: color-mix(in srgb, var(--text) 38%, transparent);
      border: 1px solid color-mix(in srgb, var(--text) 8%, transparent);
    }

    .status-tag.live {
      background: color-mix(in srgb, #4fdb82 11%, transparent);
      color: #4fdb82;
      border-color: color-mix(in srgb, #4fdb82 25%, transparent);
    }

    .bc-clock {
      font-family: 'Cinzel', serif;
      font-size: .7rem;
      letter-spacing: .1em;
      color: color-mix(in srgb, var(--text) 26%, transparent);
    }

    /* ── LEADERBOARD COL ── */
    .lb-col {
      position: absolute;
      top: 140px;
      left: 60px;
      width: 680px;
      bottom: 80px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 5;
    }

    .layout-full .lb-col,
    .layout-minimal .lb-col {
      width: 1400px;
    }

    .cat-eyebrow {
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: var(--acc);
      opacity: .65;
      margin-bottom: 8px;
    }

    #bcCatLabel {
      font-family: 'Cinzel', serif;
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: .06em;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 20px;
      text-shadow: 0 0 80px color-mix(in srgb, var(--acc) 18%, transparent);
    }

    .cat-sep {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .sep-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, color-mix(in srgb, var(--acc) 35%, transparent), transparent);
    }

    .sep-line-r {
      background: linear-gradient(270deg, color-mix(in srgb, var(--acc) 35%, transparent), transparent);
    }

    .sep-diamond {
      width: 8px;
      height: 8px;
      background: var(--acc);
      transform: rotate(45deg);
      flex-shrink: 0;
      box-shadow: 0 0 8px color-mix(in srgb, var(--acc) 60%, transparent);
    }

    /* ── ROWS CONTAINER ── */
    .rows-container {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .rows-container.style-card {
      gap: 6px;
    }

    .rows-container.style-line {
      gap: 3px;
    }

    .rows-container.style-flag {
      gap: 0;
    }


    /* ── SHIMMER SWEEP ── */
    @keyframes sweep {
      0% { transform: translateX(-150%) skewX(-20deg); }
      40%, 100% { transform: translateX(200%) skewX(-20deg); }
    }

    /* ── CARD STYLE (MINIMAL) ── */
    .bc-row.style-card {
      position: relative;
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 18px 32px;
      background: rgba(6, 5, 12, 0.45);
      border: 1px solid color-mix(in srgb, var(--acc) 15%, transparent);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 8px 30px rgba(0,0,0,0.6);
      border-radius: 4px;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      margin-bottom: 6px;
      overflow: hidden;
      transform: translateZ(0);
    }

    .bc-row.style-card.bc-row--leader {
      background: color-mix(in srgb, var(--acc) 12%, transparent);
      border-color: color-mix(in srgb, var(--acc) 50%, transparent);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), 0 12px 40px rgba(0,0,0,0.8), 0 0 0 1px color-mix(in srgb, var(--acc) 15%, transparent);
      transform: scale(1.01) translateZ(0);
    }

    .bc-row.style-card.bc-row--leader::after {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 150%; height: 100%;
      background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--acc) 25%, transparent), transparent);
      animation: sweep 4.5s cubic-bezier(0.22, 1, 0.36, 1) infinite;
      pointer-events: none;
      z-index: 10;
    }

    /* ── LINE STYLE ── */
    .bc-row.style-line {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 7px 14px 7px 0;
      border-bottom: 1px solid color-mix(in srgb, var(--acc) 7%, transparent);
    }

    .bc-row.style-line.bc-row--leader {
      border-bottom-color: color-mix(in srgb, var(--acc) 22%, transparent);
    }

    .bc-row-name-inline {
      flex: 1;
      font-family: 'Cinzel', serif;
      font-size: .9rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bc-row--leader .bc-row-name-inline {
      color: var(--acc2);
      font-weight: 700;
      font-size: .95rem;
    }

    .bc-row-sub-inline {
      font-size: .7rem;
      color: var(--acc);
      opacity: .65;
      font-family: 'Jost', sans-serif;
      font-weight: 400;
    }

    .bc-row-line-fill-wrap {
      flex: 1;
      max-width: 240px;
      height: 3px;
      background: color-mix(in srgb, var(--text) 6%, transparent);
      border-radius: 2px;
      overflow: hidden;
    }

    .bc-row-line-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--acc), var(--acc2));
      width: 0;
      transition: width 1.1s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .bc-row-count-inline {
      font-family: 'Cinzel', serif;
      font-size: .88rem;
      font-weight: 700;
      color: var(--text);
      min-width: 55px;
      text-align: right;
    }

    .bc-row--leader .bc-row-count-inline {
      color: var(--acc);
    }

    .bc-row-pct-inline {
      font-size: .62rem;
      color: color-mix(in srgb, var(--text) 36%, transparent);
      min-width: 38px;
      text-align: right;
    }

    /* ── FLAG STYLE ── */
    .bc-row.style-flag {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid color-mix(in srgb, var(--acc) 8%, transparent);
      overflow: hidden;
    }

    .bc-row.style-flag.bc-row--leader {
      background: color-mix(in srgb, var(--acc) 8%, transparent);
    }

    .bc-row-flag-num {
      width: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: .72rem;
      font-weight: 700;
      color: var(--acc);
      opacity: .55;
      flex-shrink: 0;
      padding: 10px 0;
    }

    .bc-row--leader .bc-row-flag-num {
      opacity: 1;
      font-size: .88rem;
    }

    .bc-row-flag-photo {
      width: 56px;
      height: 56px;
      overflow: hidden;
      flex-shrink: 0;
      background: color-mix(in srgb, var(--acc) 10%, transparent);
    }

    .bc-row-flag-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .bc-row-flag-body {
      flex: 1;
      padding: 9px 14px;
      min-width: 0;
    }

    .bc-row-flag-name {
      font-family: 'Cinzel', serif;
      font-size: .98rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bc-row--leader .bc-row-flag-name {
      color: var(--acc2);
      font-size: 1.05rem;
      font-weight: 700;
    }

    .bc-row-flag-sub {
      font-size: .62rem;
      color: var(--acc);
      opacity: .65;
    }

    .bc-row-flag-score {
      padding: 10px 16px;
      text-align: right;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* ── SHARED ROW ELEMENTS ── */
    .bc-row--hidden {
      display: none !important;
    }

    .bc-row--new {
      animation: rowNew .7s cubic-bezier(0.22, 1, 0.36, 1) both !important;
    }

    @keyframes rowNew {
      0% {
        opacity: 0;
        transform: translateY(28px) scale(.94);
        filter: brightness(1.3)
      }

      70% {
        filter: brightness(1)
      }

      100% {
        opacity: 1;
        transform: none;
        filter: none
      }
    }

    .bc-row.style-card,
    .bc-row.style-line {
      animation: rowIn .5s calc(var(--ri, 0)*.035s) cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .bc-row.style-flag {
      animation: rowIn .4s calc(var(--ri, 0)*.028s) cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes rowIn {
      from {
        opacity: 0;
        transform: translateY(16px);
      }
      to {
        opacity: 1;
        transform: none;
      }
    }

    .bc-row-rank {
      font-family: 'Cinzel', serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .08em;
      color: var(--acc);
      opacity: .6;
      width: 32px;
      flex-shrink: 0;
      text-align: center;
    }

    .bc-row--leader .bc-row-rank {
      opacity: 1;
      font-size: 1.35rem;
      text-shadow: 0 0 15px color-mix(in srgb, var(--acc) 60%, transparent);
    }

    .bc-row-photo {
      width: 50px;
      height: 50px;
      border-radius: 7px;
      overflow: hidden;
      flex-shrink: 0;
      background: color-mix(in srgb, var(--acc) 9%, transparent);
    }

    .bc-row-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .bc-initial {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--acc);
      opacity: .5;
    }

    .bc-row-info {
      flex: 1;
      min-width: 0;
    }

    .bc-row-name {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: .04em;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 4px 12px rgba(0,0,0,0.8);
    }

    .bc-row--leader .bc-row-name {
      font-size: 1.7rem;
      color: #ffffff;
      font-weight: 900;
      letter-spacing: .06em;
      text-shadow: 0 0 25px color-mix(in srgb, var(--acc2) 60%, transparent);
    }

    .bc-row-sub {
      font-size: .62rem;
      color: var(--acc);
      opacity: .7;
      margin-top: 2px;
    }

    .bc-row-bar {
      height: 4px;
      background: color-mix(in srgb, var(--text) 6%, transparent);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 7px;
    }

    .bc-row-fill {
      position: relative;
      height: 100%;
      background: linear-gradient(90deg, var(--acc), var(--acc2));
      width: 0;
      transition: width 1.15s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .bc-row-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: #ffffff;
      box-shadow: -2px 0 12px 3px var(--acc2);
      border-radius: 0 2px 2px 0;
    }

    .bc-row-score {
      text-align: right;
      flex-shrink: 0;
      min-width: 78px;
    }

    .bc-row-count {
      font-family: 'Cinzel', serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--text);
      line-height: 1.1;
      text-shadow: 0 4px 12px rgba(0,0,0,0.8);
    }

    .bc-row--leader .bc-row-count {
      color: var(--acc);
      font-size: 1.38rem;
    }

    .bc-row-pct {
      font-size: .58rem;
      color: color-mix(in srgb, var(--text) 36%, transparent);
      margin-top: 2px;
    }

    /* ── SPOKESPERSON ── */
    #spokeArea {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 32px 44px 24px 18px;
      position: relative;
    }

    .layout-full #spokeArea,
    .layout-minimal #spokeArea {
      display: none !important;
    }

    #spokeArea::before {
      content: '';
      position: absolute;
      top: 32px;
      bottom: 32px;
      left: 0;
      width: 1px;
      background: linear-gradient(180deg, transparent, color-mix(in srgb, var(--acc) 28%, transparent)18%, color-mix(in srgb, var(--acc) 36%, transparent)50%, color-mix(in srgb, var(--acc) 28%, transparent)82%, transparent);
      animation: sg 4.5s ease-in-out infinite alternate;
    }

    @keyframes sg {
      from {
        opacity: .5
      }

      to {
        opacity: 1;
        filter: drop-shadow(0 0 6px var(--acc))
      }
    }

    .spoke-cam {
      width: 100%;
      flex: 1;
      max-height: 700px;
      border-radius: 18px;
      background: color-mix(in srgb, var(--surface) 45%, transparent);
      border: 1px solid color-mix(in srgb, var(--acc) 13%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: inset 0 0 80px color-mix(in srgb, var(--acc) 4%, transparent), 0 0 40px color-mix(in srgb, var(--acc) 6%, transparent);
    }

    .spoke-cam::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 18px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--acc) 3%, transparent) 0%, transparent 30%, transparent 70%, color-mix(in srgb, var(--bg) 30%, transparent) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .spoke-cam-hint {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      opacity: .12;
      pointer-events: none;
      z-index: 0;
    }

    .spoke-cam-hint svg {
      color: var(--acc);
    }

    .spoke-cam-hint span {
      font-family: 'Cinzel', serif;
      font-size: .6rem;
      font-weight: 600;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--acc);
    }

    #spokeNameplate {
      display: none;
      flex-direction: column;
      align-items: center;
      background: color-mix(in srgb, var(--cardBg) 90%, transparent);
      border: 1px solid color-mix(in srgb, var(--acc) 26%, transparent);
      border-radius: 10px;
      padding: 11px 36px;
      margin-top: 14px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      text-align: center;
      width: 100%;
      box-shadow: 0 0 30px color-mix(in srgb, var(--acc) 8%, transparent);
      animation: npIn .55s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes npIn {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    #spokeName {
      font-family: 'Cinzel', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: .1em;
    }

    #spokeRole {
      font-size: .66rem;
      font-weight: 500;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--acc);
      margin-top: 4px;
      opacity: .82;
    }

    /* ── BOTTOM BAR ── */
    .bbar {
      position: absolute;
      bottom: 40px;
      left: 60px;
      right: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid color-mix(in srgb, var(--acc) 11%, transparent);
      padding-top: 10px;
      background: none;
      z-index: 10;
    }

    .bb-l {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .bb-gem {
      width: 7px;
      height: 7px;
      background: var(--acc);
      transform: rotate(45deg);
      box-shadow: 0 0 8px color-mix(in srgb, var(--acc) 50%, transparent);
    }

    .bb-brand {
      font-family: 'Cinzel', serif;
      font-size: .58rem;
      font-weight: 700;
      letter-spacing: .26em;
      text-transform: uppercase;
      color: var(--acc);
      opacity: .65;
    }

    .bb-pipe {
      width: 1px;
      height: 14px;
      background: color-mix(in srgb, var(--acc) 14%, transparent);
    }

    .bb-url {
      font-size: .58rem;
      letter-spacing: .1em;
      color: color-mix(in srgb, var(--text) 24%, transparent);
    }

    #bbMid {
      flex: 1;
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: .62rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--acc) 48%, transparent);
    }

    .bb-r {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bb-cdot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--acc) 25%, transparent);
    }

    /* ── CLOSED STAMP ── */
    .closed-stamp {
      position: absolute;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      background: color-mix(in srgb, var(--bg) 80%, transparent);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      opacity: 0;
      transition: opacity .6s;
    }
    .closed-stamp.show { opacity: 1; }
    .c-stamp-text {
      font-family: 'Cinzel', serif;
      font-size: 5rem;
      font-weight: 900;
      color: #e05050;
      letter-spacing: .2em;
      text-transform: uppercase;
      opacity: 0;
      transform: scale(1.5);
      transition: all .6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-shadow: 0 0 80px rgba(224, 80, 80, 0.4);
    }
    .closed-stamp.show .c-stamp-text {
      opacity: 1;
      transform: scale(1);
    }

    /* ── VIGNETTE ── */
    #vignette {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: radial-gradient(circle at center, transparent 30%, rgba(6, 5, 12, 0.8) 120%);
      pointer-events: none;
    }
  </style>
</head>

<body>
  <div id="scaleRoot">
    <canvas id="auroraCanvas"></canvas>
    <div class="bg-vig"></div>
    <div class="bg-scan"></div>
    <div class="top-accent"></div>
    <div class="brk brk-tl"></div>
    <div class="brk brk-tr"></div>
    <div class="brk brk-bl"></div>
    <div class="brk brk-br"></div>
    <div id="voteFlash"></div>
    <div id="partLayer"></div>
    <div id="stageRim"></div>
    <div id="spotlightLayer"></div>
    <div id="categoryWipe"></div>
    <div class="conn-dot ok" id="connDot"></div>
    <input type="hidden" id="bc_prev_revealed" value="0" />

    <!-- WINNER OVERLAY -->
    <div id="winnerOverlay">
      <div class="wo-eyebrow">🏆 &nbsp; Vencedor &nbsp; 🏆</div>
      <div class="wo-card">
        <div class="wo-crown">👑</div>
        <div class="wo-name"></div>
        <div class="wo-subtitle"></div>
        <div class="wo-stats">
          <div class="wo-pct-wrap">
            <div class="wo-pct"></div>
            <div class="wo-pct-label">dos votos</div>
          </div>
        </div>
        <div class="wo-cat"></div>
      </div>
    </div>

    <div id="leaderBanner">
      <div class="lcb-eyebrow">Novo Líder</div>
      <div class="lcb-headline">Passou à frente</div>
      <div class="lcb-name"></div>
      <div class="lcb-cat"></div>
    </div>

    <div class="stage layout-split" id="mainStage">
      <div class="topbar">
        <div class="tb-l">
          <span class="tb-brand">Grupo Armindo</span>
          <div class="tb-pipe"></div>
          <span id="bcTitle">VOTAÇÃO</span>
        </div>
        <div class="tb-r">
          <div id="totalBox" style="display:flex">
            <span class="tb-tn" id="totalCount">0</span>
            <span class="tb-tl">votos</span>
          </div>
          <div class="tb-pipe"></div>
          <div class="live-dot off" id="liveDot"></div>
          <span class="status-tag" id="statusTag">ENCERRADO</span>
          <div class="tb-pipe"></div>
          <span class="bc-clock bc-clock-wrap"></span>
        </div>
      </div>

      <div class="lb-col">
        <div id="bcEyebrow" class="cat-eyebrow">Resultados em Tempo Real</div>
        <div id="bcCatLabel">A carregar…</div>
        <div class="cat-sep">
          <div class="sep-line"></div>
          <div class="sep-diamond"></div>
          <div class="sep-line sep-line-r"></div>
        </div>
        <div id="rowsContainer" class="rows-container style-card"></div>
      </div>

      <div id="spokeArea">
        <div class="spoke-cam">
          <div class="spoke-cam-hint">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
              stroke-linecap="round">
              <path d="M23 7l-7 5 7 5V7z" />
              <rect x="1" y="5" width="15" height="14" rx="2" />
            </svg>
            <span>Câmara / Spokesperson</span>
          </div>
        </div>
        <div id="spokeNameplate">
          <div id="spokeName"></div>
          <div id="spokeRole"></div>
        </div>
      </div>

      <div class="bbar">
        <div class="bb-l">
          <div class="bb-gem"></div>
          <span class="bb-brand">Grupo Armindo</span>
          <div class="bb-pipe"></div>
          <span class="bb-url" id="bbUrl">vote.grupoarmindo.me</span>
        </div>
        <div id="bbMid"></div>
        <div class="bb-r">
          <div class="bb-cdot"></div>
          <span class="bc-clock bc-clock-wrap"
            style="font-family:'Cinzel',serif;font-size:.66rem;letter-spacing:.1em;color:color-mix(in srgb,var(--text) 24%,transparent)"></span>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
