
<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1920, height=1080"/>
<title>Broadcast Results — Official</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400;700;900&family=Outfit:wght@300;600&display=swap" rel="stylesheet"/>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8azNy6GEgD190y_fW91ahUbKa1w5veik",
  authDomain: "aawards.firebaseapp.com",
  databaseURL: "https://aawards-default-rtdb.firebaseio.com",
  projectId: "aawards",
  storageBucket: "aawards.firebasestorage.app",
  messagingSenderId: "839334918366",
  appId: "1:839334918366:web:454a259fa3e2665b46ea4f"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// Função de animação de números
function animateValue(obj, start, end, duration) {
  let startTimestamp = null;
  const step = (timestamp) => {
    if (!startTimestamp) startTimestamp = timestamp;
    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
    obj.innerHTML = Math.floor(progress * (end - start) + start).toLocaleString('pt-PT');
    if (progress < 1) {
      window.requestAnimationFrame(step);
    }
  };
  window.requestAnimationFrame(step);
}

async function loadResults() {
  const configSnap = await get(ref(db, 'config'));
  const votesSnap  = await get(ref(db, 'votes'));
  
  const config = configSnap.val() || {};
  const votes  = votesSnap.val() || {};
  const candidates = config.candidates || [];

  const sorted = [...candidates]
    .map(c => ({ ...c, count: votes[c.id] || 0 }))
    .sort((a, b) => b.count - a.count);

  const total = sorted.reduce((s, c) => s + c.count, 0);

  document.getElementById('evTitle').textContent = config.title || 'RESULTADOS';
  document.getElementById('evSub').textContent   = config.subtitle || 'CONTAGEM FINALIZADA';
  document.getElementById('totalCount').textContent = total.toLocaleString('pt-PT');

  const container = document.getElementById('resultsGrid');
  container.innerHTML = '';

  sorted.forEach((c, i) => {
    const pct = total ? (c.count / total * 100).toFixed(1) : 0;
    const isWinner = i === 0;
    
    const row = document.createElement('div');
    row.className = `result-card ${isWinner ? 'winner' : ''}`;
    row.style.setProperty('--delay', `${i * 0.15}s`);
    
    row.innerHTML = `
      <div class="rank">#${i + 1}</div>
      <div class="photo-area">
        ${c.photo ? `<img src="${c.photo}" />` : `<div class="initials">${c.name.charAt(0)}</div>`}
        ${isWinner ? '<div class="winner-badge">VENCEDOR</div>' : ''}
      </div>
      <div class="info">
        <div class="name">${c.name}</div>
        <div class="subtitle">${c.subtitle || ''}</div>
      </div>
      <div class="data-viz">
        <div class="bar-container">
          <div class="bar-fill" style="width: 0%" data-pct="${pct}"></div>
        </div>
        <div class="numbers">
          <span class="pct-val">${pct}%</span>
          <span class="vote-val" data-val="${c.count}">0</span>
        </div>
      </div>
    `;
    container.appendChild(row);

    // Animar barra e números após entrada
    setTimeout(() => {
      row.querySelector('.bar-fill').style.width = pct + '%';
      animateValue(row.querySelector('.vote-val'), 0, c.count, 1500);
    }, 600 + (i * 150));
  });
}

// Iniciar
loadResults();
</script>

<style>
:root {
  --bg-deep: #020205;
  --accent: #d4af37; /* Gold */
  --accent-bright: #f9e297;
  --glass: rgba(255, 255, 255, 0.05);
  --glass-border: rgba(255, 255, 255, 0.12);
  --text-main: #ffffff;
  --text-dim: rgba(255, 255, 255, 0.6);
  --font-display: 'Cinzel', serif;
  --font-main: 'Outfit', sans-serif;
  --font-data: 'Inter', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1920px; height: 1080px;
  background-color: var(--bg-deep);
  color: var(--text-main);
  font-family: var(--font-main);
  overflow: hidden;
  background-image: 
    radial-gradient(circle at 0% 0%, rgba(212, 175, 55, 0.08) 0%, transparent 40%),
    radial-gradient(circle at 100% 100%, rgba(45, 66, 255, 0.08) 0%, transparent 40%);
}

/* Background Elements */
.bg-overlay {
  position: fixed; inset: 0;
  background: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
  opacity: 0.2; pointer-events: none;
}

/* Layout */
.screen {
  position: relative;
  z-index: 10;
  height: 1080px;
  display: flex;
  flex-direction: column;
  padding: 60px 80px;
}

/* Header */
.header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  border-bottom: 2px solid var(--glass-border);
  padding-bottom: 30px;
  margin-bottom: 40px;
}

.title-group h1 {
  font-family: var(--font-display);
  font-size: 64px;
  letter-spacing: 4px;
  text-transform: uppercase;
  background: linear-gradient(to bottom, #fff, #ccc);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.title-group p {
  font-size: 20px;
  color: var(--accent);
  letter-spacing: 8px;
  font-weight: 300;
  text-transform: uppercase;
}

.official-badge {
  background: rgba(212, 175, 55, 0.15);
  border: 1px solid var(--accent);
  padding: 10px 25px;
  border-radius: 4px;
  text-align: right;
}

.official-badge span {
  display: block;
  font-size: 12px;
  color: var(--accent);
  letter-spacing: 2px;
}

.official-badge strong {
  font-size: 28px;
  font-family: var(--font-data);
}

/* Results Grid */
.results-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  flex: 1;
}

/* Cards */
.result-card {
  background: var(--glass);
  backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  height: 140px;
  display: flex;
  align-items: center;
  padding: 0 30px;
  position: relative;
  opacity: 0;
  transform: translateX(-50px);
  animation: cardEntry 0.8s var(--delay) forwards cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes cardEntry {
  to { opacity: 1; transform: translateX(0); }
}

.result-card.winner {
  background: linear-gradient(90deg, rgba(212, 175, 55, 0.15) 0%, var(--glass) 100%);
  border-left: 5px solid var(--accent);
  height: 180px;
  grid-column: span 2;
  margin-bottom: 10px;
}

.rank {
  font-family: var(--font-data);
  font-weight: 900;
  font-size: 24px;
  color: var(--text-dim);
  width: 60px;
}

.winner .rank { font-size: 40px; color: var(--accent); }

.photo-area {
  width: 80px; height: 80px;
  margin-right: 25px;
  position: relative;
}

.winner .photo-area { width: 120px; height: 120px; }

.photo-area img, .initials {
  width: 100%; height: 100%;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--glass-border);
}

.winner img { border-color: var(--accent); box-shadow: 0 0 30px rgba(212,175,55,0.3); }

.winner-badge {
  position: absolute;
  bottom: -10px; left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: #000;
  font-weight: 900;
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 20px;
}

.info { flex: 0 0 300px; }
.name { font-size: 28px; font-weight: 700; }
.winner .name { font-size: 42px; }
.subtitle { font-size: 16px; color: var(--text-dim); margin-top: 5px; }

.data-viz { flex: 1; margin-left: 40px; }

.bar-container {
  height: 8px;
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  overflow: hidden;
  margin-bottom: 15px;
}

.bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent-bright));
  transition: width 1.5s ease-out;
}

.numbers {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  font-family: var(--font-data);
}

.pct-val { font-size: 32px; font-weight: 900; }
.winner .pct-val { font-size: 48px; color: var(--accent); }
.vote-val { font-size: 18px; color: var(--text-dim); }

/* Footer */
.footer {
  margin-top: 40px;
  display: flex;
  justify-content: center;
  gap: 50px;
  color: var(--text-dim);
  font-size: 14px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.footer-item { display: flex; align-items: center; gap: 10px; }
.footer-item::before { content: '◆'; color: var(--accent); }

</style>
</head>
<body>
  <div class="bg-overlay"></div>

  <div class="screen">
    <header class="header">
      <div class="title-group">
        <p id="evSub">Apuramento Final</p>
        <h1 id="evTitle">CARREGANDO...</h1>
      </div>
      <div class="official-badge">
        <span>VOTOS TOTAIS</span>
        <strong id="totalCount">0</strong>
      </div>
    </header>

    <div class="results-grid" id="resultsGrid">
      <!-- Gerado via JS -->
    </div>

    <footer class="footer">
      <div class="footer-item">Resultados Oficiais Auditados</div>
      <div class="footer-item">Sistema de Votação Certificado</div>
      <div class="footer-item" id="liveTime">00:00:00</div>
    </footer>
  </div>

<script>
  function updateTime() {
    const now = new Date();
    document.getElementById('liveTime').textContent = now.toLocaleTimeString('pt-PT');
  }
  setInterval(updateTime, 1000);
  updateTime();
</script>
</body>
</html>
