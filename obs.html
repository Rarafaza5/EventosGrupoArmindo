<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Broadcast — Grupo Armindo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;900&family=Jost:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap"
    rel="stylesheet" />
  <script>
    function scaleObs() {
      const el = document.getElementById('scaleRoot'); if (!el) return;
      const sx = window.innerWidth / 1920, sy = window.innerHeight / 1080, s = Math.min(sx, sy);
      el.style.transform = `scale(${s})`;
      el.style.left = ((window.innerWidth - 1920 * s) / 2) + 'px';
      el.style.top = ((window.innerHeight - 1080 * s) / 2) + 'px';
    }
    window.addEventListener('DOMContentLoaded', scaleObs);
    window.addEventListener('resize', scaleObs);
  </script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
    const db = getDatabase(initializeApp({ apiKey: "AIzaSyA8azNy6GEgD190y_fW91ahUbKa1w5veik", authDomain: "aawards.firebaseapp.com", databaseURL: "https://aawards-default-rtdb.firebaseio.com", projectId: "aawards", storageBucket: "aawards.firebasestorage.app", messagingSenderId: "839334918366", appId: "1:839334918366:web:454a259fa3e2665b46ea4f" }));
    let cfg = null, vts = {}, pTot = {}, vFTO = null, lcTO = null, prevLeader = '';

    /* ── CLOCK ── */
    function startClock() {
      const tick = () => { const n = new Date(); const t = [n.getHours(), n.getMinutes(), n.getSeconds()].map(v => String(v).padStart(2, '0')).join(':'); document.querySelectorAll('.bc-clock').forEach(el => el.textContent = t); };
      tick(); setInterval(tick, 1000);
    }

    /* ── ANIMATED COUNTER ── */
    function animCount(el, from, to, ms = 1000) {
      if (!el || from === to) return; const start = performance.now();
      (function step(now) {
        const p = Math.min((now - start) / ms, 1), e = 1 - Math.pow(1 - p, 4);
        el.textContent = Math.round(from + (to - from) * e).toLocaleString('pt-PT');
        if (p < 1) requestAnimationFrame(step); else el.textContent = to.toLocaleString('pt-PT');
      })(performance.now());
    }

    /* ── THEME ── */
    function applyTheme(t) {
      if (!t) return; const r = document.documentElement;
      r.style.setProperty('--acc', t.accent || '#c4973a');
      r.style.setProperty('--acc2', t.accent2 || '#e8d5a3');
      r.style.setProperty('--bg', t.bg || '#07060e');
      r.style.setProperty('--surface', t.surface || '#0d0c1a');
      r.style.setProperty('--cardBg', t.cardBg || '#0e0d1c');
      r.style.setProperty('--text', t.text || '#ede9e0');
      // Rebuild aurora with new accent
      buildAurora();
    }

    /* ── AURORA CANVAS ── */
    let auroraCtx = null, auroraT = 0, stars = [];
    function buildAurora() {
      const c = document.getElementById('auroraCanvas'); if (!c) return;
      if (!auroraCtx) {
        auroraCtx = c.getContext('2d'); c.width = 1920; c.height = 1080;
        stars = Array.from({ length: 220 }, () => ({ x: Math.random() * 1920, y: Math.random() * 1080, r: Math.random() * 1.6 + .2, a: Math.random() * .5 + .05, da: (Math.random() - .5) * .004, vx: (Math.random() - .5) * .06, vy: (Math.random() - .5) * .04 }));
        (function loop() {
          auroraCtx.clearRect(0, 0, 1920, 1080); auroraT += .005;
          const acc = getComputedStyle(document.documentElement).getPropertyValue('--acc').trim() || '#c4973a';
          // Parse hex to rgb
          const hx = acc.replace('#', '');
          const ar = parseInt(hx.substring(0, 2), 16), ag = parseInt(hx.substring(2, 4), 16), ab = parseInt(hx.substring(4, 6), 16);
          for (let layer = 0; layer < 4; layer++) {
            const phase = auroraT + layer * 1.4;
            const yBase = 180 + layer * 100 + Math.sin(phase * .6) * 70;
            const grad = auroraCtx.createLinearGradient(0, yBase - 140, 0, yBase + 140);
            const alpha = [.055, .04, .03, .02][layer];
            grad.addColorStop(0, 'transparent');
            grad.addColorStop(.35, `rgba(${ar},${ag},${ab},${alpha})`);
            grad.addColorStop(.65, `rgba(${Math.min(ar + 20, 255)},${ag},${Math.min(ab + 30, 255)},${alpha * .7})`);
            grad.addColorStop(1, 'transparent');
            auroraCtx.beginPath(); auroraCtx.moveTo(0, yBase);
            for (let x = 0; x <= 1920; x += 6) { const y = yBase + Math.sin(x * .0025 + phase) * 60 + Math.sin(x * .006 + phase * 1.4) * 28; auroraCtx.lineTo(x, y); }
            auroraCtx.lineTo(1920, 1080); auroraCtx.lineTo(0, 1080); auroraCtx.closePath();
            auroraCtx.fillStyle = grad; auroraCtx.fill();
          }
          stars.forEach(s => {
            s.x += s.vx; s.y += s.vy; s.a += s.da;
            if (s.a < .03 || s.a > .65) s.da *= -1;
            if (s.x < -2) s.x = 1922; if (s.x > 1922) s.x = -2; if (s.y < -2) s.y = 1082; if (s.y > 1082) s.y = -2;
            auroraCtx.beginPath(); auroraCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
            auroraCtx.fillStyle = acc; auroraCtx.globalAlpha = s.a; auroraCtx.fill();
          });
          auroraCtx.globalAlpha = 1;
          requestAnimationFrame(loop);
        })();
      }
    }

    /* ── PARTICLES ── */
    function spawnParticles(n = 40, x0 = null) {
      const layer = document.getElementById('partLayer');
      const cols = ['var(--acc)', 'var(--acc2)', '#fff8e0', '#ffffff', 'rgba(255,255,255,.6)'];
      for (let i = 0; i < n; i++) {
        const p = document.createElement('div'); p.className = 'part';
        const c = cols[Math.floor(Math.random() * cols.length)];
        const x = x0 != null ? x0 + (Math.random() - .5) * 200 : Math.random() * 1920;
        const dur = Math.random() * 2 + 1, drift = (Math.random() - .5) * 400, sz = Math.random() * 11 + 3;
        p.style.cssText = `left:${x}px;bottom:0;width:${sz}px;height:${sz}px;background:${c};border-radius:${Math.random() > .4 ? '50%' : '3px'};animation:partRise ${dur}s ease-out forwards;--d:${drift}px;animation-delay:${Math.random() * .6}s`;
        layer.appendChild(p); setTimeout(() => p.remove(), (dur + 1) * 1000);
      }
    }

    /* ── VOTE FLASH ── */
    function flashVote() {
      const el = document.getElementById('voteFlash'); if (!el) return;
      el.classList.add('active'); clearTimeout(vFTO);
      vFTO = setTimeout(() => el.classList.remove('active'), 600);
    }

    /* ── LEADER CHANGE BANNER ── */
    function showLeaderBanner(name, cat) {
      const b = document.getElementById('leaderBanner'); if (!b) return;
      b.querySelector('.lcb-name').textContent = name;
      b.querySelector('.lcb-cat').textContent = cat || '';
      b.classList.add('show'); clearTimeout(lcTO);
      lcTO = setTimeout(() => b.classList.remove('show'), 5000);
      spawnParticles(50);
    }

    /* ── RESOLVE CAT ── */
    function resolveCat(config, votes, catId) {
      const sid = config.sessionId || 'default', sv = votes[sid] || {};
      if (config.categories && config.categories.length > 0) {
        const cat = config.categories.find(c => c.id === catId) || config.categories[0];
        const cv = sv['cat_' + cat.id] || {};
        return { cat, cands: [...(cat.candidates || [])].map(c => ({ ...c, count: cv[c.id] || 0 })).sort((a, b) => b.count - a.count), total: Object.values(cv).reduce((s, v) => s + v, 0) };
      }
      const lv = sv.votes || {};
      return { cat: { id: 'default', name: config.title || 'Votação' }, cands: [...(config.candidates || [])].map(c => ({ ...c, count: lv[c.id] || 0 })).sort((a, b) => b.count - a.count), total: Object.values(lv).reduce((s, v) => s + v, 0) };
    }

    /* ── MAIN RENDER ── */
    function render(config, votes) {
      if (!config) return;
      applyTheme(config.theme);
      const bc = config.broadcast || {};
      const catId = bc.catId || config.activeCategory || config.categories?.[0]?.id || 'default';
      const { cat, cands, total } = resolveCat(config, votes, catId);
      const isOpen = config.votingOpen || false;
      const revealed = Math.min(bc.revealed ?? 0, cands.length);
      const showSpoke = bc.showSpokesperson !== false;
      const catLabel = bc.customLabel || cat.name;
      const layout = bc.layout || 'split'; // 'split' | 'full' | 'minimal'
      const rowStyle = bc.rowStyle || 'card'; // 'card' | 'line' | 'flag'
      const showPhotos = bc.showPhotos !== false;
      const showBars = bc.showBars !== false;
      const showPct = bc.showPct !== false;
      const showCount = bc.showCount !== false;
      const showLive = bc.showLiveVotes !== false;
      const showClock = bc.showClock !== false;
      const showStatus = bc.showStatus !== false;
      const eyebrowText = bc.eyebrowText || 'Resultados em Tempo Real';
      const footerText = bc.footerText || 'vote.grupoarmindo.me';

      // Flash & leader detection
      const prevT = pTot[cat.id] || 0;
      if (total > prevT && revealed >= cands.length) flashVote();
      pTot[cat.id] = total;
      if (cands.length > 0 && cands[0].count > 0) {
        const ldr = cands[0].name;
        if (prevLeader && prevLeader !== ldr) { showLeaderBanner(ldr, cat.name); }
        prevLeader = ldr;
      }

      // Header
      document.getElementById('bcTitle').textContent = config.title || 'VOTAÇÃO';
      document.getElementById('bcCatLabel').textContent = catLabel;
      document.getElementById('bcEyebrow').textContent = eyebrowText;
      document.getElementById('liveDot').className = 'live-dot' + (isOpen ? ' on' : ' off');
      const stag = document.getElementById('statusTag');
      stag.textContent = isOpen ? 'AO VIVO' : 'ENCERRADO'; stag.className = 'status-tag' + (isOpen ? ' live' : '');

      // Total
      if (showLive) { animCount(document.getElementById('totalCount'), pTot['__d'] || 0, total); pTot['__d'] = total; document.getElementById('totalBox').style.display = 'flex'; }
      else document.getElementById('totalBox').style.display = 'none';

      // Clock
      document.querySelectorAll('.bc-clock-wrap').forEach(el => el.style.display = showClock ? '' : 'none');
      // Status
      document.getElementById('statusTag').style.display = showStatus ? '' : 'none';
      document.getElementById('liveDot').style.display = showStatus ? '' : 'none';

      // Footer
      document.getElementById('bbUrl').textContent = footerText;
      document.getElementById('bbMid').textContent = catLabel;

      // Layout
      const stage = document.getElementById('mainStage');
      stage.className = 'stage layout-' + layout;

      // Spoke
      const sa = document.getElementById('spokeArea');
      sa.style.display = (showSpoke && layout !== 'full') ? 'flex' : 'none';
      const sn = bc.spokespersonName || '', sr = bc.spokespersonRole || '';
      document.getElementById('spokeName').textContent = sn;
      document.getElementById('spokeRole').textContent = sr;
      document.getElementById('spokeNameplate').style.display = (sn || sr) ? 'flex' : 'none';

      // Rows
      renderRows(cands, total, revealed, bc.highlightLeader !== false, rowStyle, showPhotos, showBars, showPct, showCount);
    }

    function renderRows(cands, total, revealed, hlLeader, style, showPhotos, showBars, showPct, showCount) {
      const container = document.getElementById('rowsContainer');
      const prevShown = container.querySelectorAll('.bc-row:not(.bc-row--hidden)').length;
      const newReveal = revealed > prevShown;
      container.innerHTML = '';
      container.className = 'rows-container style-' + style;
      const rev = [...cands].reverse();
      rev.forEach((c, idx) => {
        const rank = cands.length - idx, pct = total > 0 ? (c.count / total * 100).toFixed(1) : 0;
        const isShown = idx < revealed, isLeader = rank === 1 && hlLeader && c.count > 0;
        const isNew = isShown && idx === revealed - 1 && newReveal;
        const row = document.createElement('div');
        row.className = 'bc-row style-' + style + (isLeader ? ' bc-row--leader' : '') + (!isShown ? ' bc-row--hidden' : '') + (isNew ? ' bc-row--new' : '');
        row.style.setProperty('--ri', idx);
        if (style === 'flag') {
          row.innerHTML = `
            <div class="bc-row-flag-num">${isLeader ? '◆' : String(rank).padStart(2, '0')}</div>
            ${showPhotos ? `<div class="bc-row-flag-photo">${c.photo ? `<img src="${c.photo}" alt="${c.name}"/>` : `<div class="bc-initial">${c.name.charAt(0)}</div>`}</div>` : ''}
            <div class="bc-row-flag-body">
              <div class="bc-row-flag-name">${c.name}${c.subtitle ? `<span class="bc-row-flag-sub"> · ${c.subtitle}</span>` : ''}</div>
              ${showBars ? `<div class="bc-row-bar"><div class="bc-row-fill" data-pct="${pct}" style="width:0%"></div></div>` : ''}
            </div>
            <div class="bc-row-flag-score">
              ${showCount ? `<div class="bc-row-count">${c.count.toLocaleString('pt-PT')}</div>` : ''}
              ${showPct ? `<div class="bc-row-pct">${pct}%</div>` : ''}
            </div>`;
        } else if (style === 'line') {
          row.innerHTML = `
            <div class="bc-row-rank">${isLeader ? '◆' : String(rank).padStart(2, '0')}</div>
            ${showPhotos ? `<div class="bc-row-photo">${c.photo ? `<img src="${c.photo}" alt="${c.name}"/>` : `<div class="bc-initial">${c.name.charAt(0)}</div>`}</div>` : ''}
            <div class="bc-row-name-inline">${c.name}${c.subtitle ? `<span class="bc-row-sub-inline"> ${c.subtitle}</span>` : ''}</div>
            <div class="bc-row-line-fill-wrap">${showBars ? `<div class="bc-row-line-fill" data-pct="${pct}" style="width:0%"></div>` : ''}</div>
            ${showCount ? `<div class="bc-row-count-inline">${c.count.toLocaleString('pt-PT')}</div>` : ''}
            ${showPct ? `<div class="bc-row-pct-inline">${pct}%</div>` : ''}`;
        } else {
          // card (default)
          row.innerHTML = `
            <div class="bc-row-rank">${isLeader ? '◆' : String(rank).padStart(2, '0')}</div>
            ${showPhotos ? `<div class="bc-row-photo">${c.photo ? `<img src="${c.photo}" alt="${c.name}"/>` : `<div class="bc-initial">${c.name.charAt(0)}</div>`}</div>` : ''}
            <div class="bc-row-info">
              <div class="bc-row-name">${c.name}</div>
              ${c.subtitle ? `<div class="bc-row-sub">${c.subtitle}</div>` : ''}
              ${showBars ? `<div class="bc-row-bar"><div class="bc-row-fill" data-pct="${pct}" style="width:0%"></div></div>` : ''}
            </div>
            <div class="bc-row-score">
              ${showCount ? `<div class="bc-row-count">${c.count.toLocaleString('pt-PT')}</div>` : ''}
              ${showPct ? `<div class="bc-row-pct">${pct}%</div>` : ''}
            </div>`;
        }
        container.appendChild(row);
        if (isShown) setTimeout(() => { const b = row.querySelector('.bc-row-fill,.bc-row-line-fill'); if (b) b.style.width = pct + '%'; }, 80);
        if (isNew && isLeader) setTimeout(() => spawnParticles(55), 250);
      });
    }

    onValue(ref(db, 'config'), snap => { cfg = snap.val() || {}; render(cfg, vts); });
    onValue(ref(db, 'sessions'), snap => { vts = snap.val() || {}; if (cfg) render(cfg, vts); });
    document.addEventListener('DOMContentLoaded', () => { startClock(); buildAurora(); });
  </script>
  <style>
    :root {
      --acc: #c4973a;
      --acc2: #e8d5a3;
      --bg: #07060e;
      --surface: #0d0c1a;
      --cardBg: #0e0d1c;
      --text: #ede9e0;
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: 'Jost', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* ── SCALE ROOT ── */
    #scaleRoot {
      position: fixed;
      top: 0;
      left: 0;
      width: 1920px;
      height: 1080px;
      transform-origin: top left;
      overflow: hidden;
      background: var(--bg);
    }

    /* ── AURORA ── */
    #auroraCanvas {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    /* ── BG LAYERS ── */
    .bg-vig {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: radial-gradient(ellipse 130% 115% at 50% 50%, transparent 28%, rgba(0, 0, 0, .75)100%);
    }

    .bg-scan {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: .55;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0, 0, 0, .018) 3px, rgba(0, 0, 0, .018) 4px);
    }

    /* Top accent bar */
    .top-accent {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      z-index: 10;
      background: linear-gradient(90deg, transparent 0%, color-mix(in srgb, var(--acc) 40%, transparent)8%, var(--acc)32%, var(--acc2)50%, var(--acc)68%, color-mix(in srgb, var(--acc) 40%, transparent)92%, transparent 100%);
      animation: tla 6s ease-in-out infinite alternate;
      box-shadow: 0 0 20px color-mix(in srgb, var(--acc) 40%, transparent);
    }

    @keyframes tla {
      0% {
        opacity: .5;
        filter: blur(0)
      }

      50% {
        opacity: 1;
        filter: blur(.8px)
      }

      100% {
        opacity: .55;
        filter: blur(0)
      }
    }

    /* Corners */
    .brk {
      position: absolute;
      z-index: 9;
      width: 50px;
      height: 50px;
    }

    .brk-tl {
      top: 24px;
      left: 24px;
      border-top: 1.5px solid color-mix(in srgb, var(--acc) 50%, transparent);
      border-left: 1.5px solid color-mix(in srgb, var(--acc) 50%, transparent);
    }

    .brk-tr {
      top: 24px;
      right: 24px;
      border-top: 1.5px solid color-mix(in srgb, var(--acc) 50%, transparent);
      border-right: 1.5px solid color-mix(in srgb, var(--acc) 50%, transparent);
    }

    .brk-bl {
      bottom: 24px;
      left: 24px;
      border-bottom: 1.5px solid color-mix(in srgb, var(--acc) 50%, transparent);
      border-left: 1.5px solid color-mix(in srgb, var(--acc) 50%, transparent);
    }

    .brk-br {
      bottom: 24px;
      right: 24px;
      border-bottom: 1.5px solid color-mix(in srgb, var(--acc) 50%, transparent);
      border-right: 1.5px solid color-mix(in srgb, var(--acc) 50%, transparent);
    }

    /* FX */
    #voteFlash {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      background: radial-gradient(ellipse 90% 90% at 35% 50%, color-mix(in srgb, var(--acc) 10%, transparent), transparent);
      opacity: 0;
      transition: opacity .07s;
    }

    #voteFlash.active {
      opacity: 1;
      transition: opacity 0s;
    }

    #partLayer {
      position: absolute;
      inset: 0;
      z-index: 9;
      pointer-events: none;
      overflow: hidden;
    }

    .part {
      position: absolute;
      will-change: transform, opacity;
    }

    @keyframes partRise {
      0% {
        transform: translateY(0) translateX(0) rotate(0);
        opacity: 1
      }

      60% {
        opacity: .9
      }

      100% {
        transform: translateY(-80vh) translateX(var(--d)) rotate(750deg);
        opacity: 0
      }
    }

    /* ── LEADER BANNER ── */
    #leaderBanner {
      position: absolute;
      top: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      z-index: 50;
      pointer-events: none;
      background: color-mix(in srgb, var(--cardBg) 92%, transparent);
      border: 1px solid var(--acc);
      border-radius: 14px;
      padding: 22px 52px;
      text-align: center;
      opacity: 0;
      transition: all .55s cubic-bezier(0.22, 1, 0.36, 1);
      backdrop-filter: blur(32px);
      -webkit-backdrop-filter: blur(32px);
      box-shadow: 0 0 60px color-mix(in srgb, var(--acc) 14%, transparent), 0 0 0 1px color-mix(in srgb, var(--acc) 20%, transparent);
    }

    #leaderBanner.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .lcb-eyebrow {
      font-size: .58rem;
      font-weight: 700;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--acc);
      margin-bottom: 6px;
    }

    .lcb-headline {
      font-size: .72rem;
      letter-spacing: .14em;
      color: color-mix(in srgb, var(--text) 50%, transparent);
      margin-bottom: 8px;
    }

    .lcb-name {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      font-weight: 900;
      color: var(--text);
      letter-spacing: .06em;
    }

    .lcb-cat {
      font-size: .65rem;
      color: var(--acc);
      letter-spacing: .14em;
      text-transform: uppercase;
      margin-top: 5px;
      opacity: .75;
    }

    /* ── STAGE ── */
    .stage {
      position: relative;
      z-index: 5;
      width: 1920px;
      height: 1080px;
      display: grid;
      grid-template-rows: 78px 1fr 52px;
    }

    .layout-split {
      grid-template-columns: 1fr 660px;
    }

    .layout-full {
      grid-template-columns: 1fr 0px;
    }

    .layout-minimal {
      grid-template-columns: 1fr 0px;
    }

    /* ── TOPBAR ── */
    .topbar {
      grid-column: 1/-1;
      grid-row: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 60px;
      background: color-mix(in srgb, var(--bg) 55%, transparent);
      border-bottom: 1px solid color-mix(in srgb, var(--acc) 12%, transparent);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      position: relative;
    }

    .topbar::after {
      content: '';
      position: absolute;
      bottom: -1px;
      left: 60px;
      right: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--acc) 22%, transparent)30%, color-mix(in srgb, var(--acc) 28%, transparent)50%, color-mix(in srgb, var(--acc) 22%, transparent)70%, transparent);
    }

    .tb-l {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .tb-brand {
      font-family: 'Cinzel', serif;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--acc);
      opacity: .88;
    }

    .tb-pipe {
      width: 1px;
      height: 22px;
      background: color-mix(in srgb, var(--acc) 18%, transparent);
    }

    #bcTitle {
      font-family: 'Cinzel', serif;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--text);
      opacity: .75;
    }

    .tb-r {
      display: flex;
      align-items: center;
      gap: 22px;
    }

    #totalBox {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .tb-tn {
      font-family: 'Cinzel', serif;
      font-size: 1.45rem;
      font-weight: 700;
      color: var(--acc);
      line-height: 1;
    }

    .tb-tl {
      font-size: .56rem;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--text) 36%, transparent);
    }

    .live-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--text) 20%, transparent);
      flex-shrink: 0;
      transition: background .5s;
    }

    .live-dot.on {
      background: #4fdb82;
      box-shadow: 0 0 0 4px color-mix(in srgb, #4fdb82 16%, transparent);
      animation: dp 2.5s ease infinite;
    }

    .live-dot.off {
      background: #e05050;
    }

    @keyframes dp {

      0%,
      100% {
        box-shadow: 0 0 0 3px color-mix(in srgb, #4fdb82 16%, transparent)
      }

      50% {
        box-shadow: 0 0 0 9px color-mix(in srgb, #4fdb82 0%, transparent)
      }
    }

    .status-tag {
      font-family: 'Cinzel', serif;
      font-size: .58rem;
      font-weight: 700;
      letter-spacing: .2em;
      text-transform: uppercase;
      padding: 5px 13px;
      border-radius: 100px;
      background: color-mix(in srgb, var(--text) 5%, transparent);
      color: color-mix(in srgb, var(--text) 38%, transparent);
      border: 1px solid color-mix(in srgb, var(--text) 8%, transparent);
    }

    .status-tag.live {
      background: color-mix(in srgb, #4fdb82 11%, transparent);
      color: #4fdb82;
      border-color: color-mix(in srgb, #4fdb82 25%, transparent);
    }

    .bc-clock {
      font-family: 'Cinzel', serif;
      font-size: .7rem;
      letter-spacing: .1em;
      color: color-mix(in srgb, var(--text) 26%, transparent);
    }

    /* ── LEADERBOARD COL ── */
    .lb-col {
      grid-column: 1;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      padding: 36px 32px 24px 60px;
      overflow: hidden;
    }

    .layout-full .lb-col,
    .layout-minimal .lb-col {
      padding-right: 60px;
    }

    .cat-eyebrow {
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .24em;
      text-transform: uppercase;
      color: var(--acc);
      opacity: .65;
      margin-bottom: 8px;
    }

    #bcCatLabel {
      font-family: 'Cinzel', serif;
      font-size: 2.2rem;
      font-weight: 900;
      letter-spacing: .06em;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 20px;
      text-shadow: 0 0 80px color-mix(in srgb, var(--acc) 18%, transparent);
    }

    .cat-sep {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .sep-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, color-mix(in srgb, var(--acc) 35%, transparent), transparent);
    }

    .sep-line-r {
      background: linear-gradient(270deg, color-mix(in srgb, var(--acc) 35%, transparent), transparent);
    }

    .sep-diamond {
      width: 8px;
      height: 8px;
      background: var(--acc);
      transform: rotate(45deg);
      flex-shrink: 0;
      box-shadow: 0 0 8px color-mix(in srgb, var(--acc) 60%, transparent);
    }

    /* ── ROWS CONTAINER ── */
    .rows-container {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .rows-container.style-card {
      gap: 6px;
    }

    .rows-container.style-line {
      gap: 3px;
    }

    .rows-container.style-flag {
      gap: 0;
    }

    /* ── CARD STYLE ── */
    .bc-row.style-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 10px 18px 10px 12px;
      background: color-mix(in srgb, var(--cardBg) 72%, transparent);
      border: 1px solid color-mix(in srgb, var(--acc) 8%, transparent);
      border-radius: 10px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .bc-row.style-card.bc-row--leader {
      background: color-mix(in srgb, var(--acc) 12%, transparent);
      border-color: color-mix(in srgb, var(--acc) 34%, transparent);
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--acc) 12%, transparent), 0 4px 32px color-mix(in srgb, var(--acc) 14%, transparent);
    }

    /* ── LINE STYLE ── */
    .bc-row.style-line {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 7px 14px 7px 0;
      border-bottom: 1px solid color-mix(in srgb, var(--acc) 7%, transparent);
    }

    .bc-row.style-line.bc-row--leader {
      border-bottom-color: color-mix(in srgb, var(--acc) 22%, transparent);
    }

    .bc-row-name-inline {
      flex: 1;
      font-family: 'Cinzel', serif;
      font-size: .9rem;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bc-row--leader .bc-row-name-inline {
      color: var(--acc2);
      font-weight: 700;
      font-size: .95rem;
    }

    .bc-row-sub-inline {
      font-size: .7rem;
      color: var(--acc);
      opacity: .65;
      font-family: 'Jost', sans-serif;
      font-weight: 400;
    }

    .bc-row-line-fill-wrap {
      flex: 1;
      max-width: 240px;
      height: 3px;
      background: color-mix(in srgb, var(--text) 6%, transparent);
      border-radius: 2px;
      overflow: hidden;
    }

    .bc-row-line-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--acc), var(--acc2));
      width: 0;
      transition: width 1.1s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .bc-row-count-inline {
      font-family: 'Cinzel', serif;
      font-size: .88rem;
      font-weight: 700;
      color: var(--text);
      min-width: 55px;
      text-align: right;
    }

    .bc-row--leader .bc-row-count-inline {
      color: var(--acc);
    }

    .bc-row-pct-inline {
      font-size: .62rem;
      color: color-mix(in srgb, var(--text) 36%, transparent);
      min-width: 38px;
      text-align: right;
    }

    /* ── FLAG STYLE ── */
    .bc-row.style-flag {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid color-mix(in srgb, var(--acc) 8%, transparent);
      overflow: hidden;
    }

    .bc-row.style-flag.bc-row--leader {
      background: color-mix(in srgb, var(--acc) 8%, transparent);
    }

    .bc-row-flag-num {
      width: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: .72rem;
      font-weight: 700;
      color: var(--acc);
      opacity: .55;
      flex-shrink: 0;
      padding: 10px 0;
    }

    .bc-row--leader .bc-row-flag-num {
      opacity: 1;
      font-size: .88rem;
    }

    .bc-row-flag-photo {
      width: 56px;
      height: 56px;
      overflow: hidden;
      flex-shrink: 0;
      background: color-mix(in srgb, var(--acc) 10%, transparent);
    }

    .bc-row-flag-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .bc-row-flag-body {
      flex: 1;
      padding: 9px 14px;
      min-width: 0;
    }

    .bc-row-flag-name {
      font-family: 'Cinzel', serif;
      font-size: .98rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bc-row--leader .bc-row-flag-name {
      color: var(--acc2);
      font-size: 1.05rem;
      font-weight: 700;
    }

    .bc-row-flag-sub {
      font-size: .62rem;
      color: var(--acc);
      opacity: .65;
    }

    .bc-row-flag-score {
      padding: 10px 16px;
      text-align: right;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* ── SHARED ROW ELEMENTS ── */
    .bc-row--hidden {
      display: none !important;
    }

    .bc-row--new {
      animation: rowNew .7s cubic-bezier(0.22, 1, 0.36, 1) both !important;
    }

    @keyframes rowNew {
      0% {
        opacity: 0;
        transform: translateY(28px) scale(.94);
        filter: brightness(1.3)
      }

      70% {
        filter: brightness(1)
      }

      100% {
        opacity: 1;
        transform: none;
        filter: none
      }
    }

    .bc-row.style-card,
    .bc-row.style-line {
      animation: rowIn .5s calc(var(--ri, 0)*.035s) cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .bc-row.style-flag {
      animation: rowIn .4s calc(var(--ri, 0)*.028s) cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes rowIn {
      from {
        opacity: 0;
        transform: translateX(-14px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    .bc-row-rank {
      font-family: 'Cinzel', serif;
      font-size: .7rem;
      font-weight: 700;
      letter-spacing: .07em;
      color: var(--acc);
      opacity: .5;
      width: 28px;
      flex-shrink: 0;
      text-align: center;
    }

    .bc-row--leader .bc-row-rank {
      opacity: 1;
      font-size: .92rem;
    }

    .bc-row-photo {
      width: 50px;
      height: 50px;
      border-radius: 7px;
      overflow: hidden;
      flex-shrink: 0;
      background: color-mix(in srgb, var(--acc) 9%, transparent);
    }

    .bc-row-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .bc-initial {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--acc);
      opacity: .5;
    }

    .bc-row-info {
      flex: 1;
      min-width: 0;
    }

    .bc-row-name {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .bc-row--leader .bc-row-name {
      font-size: 1.14rem;
      color: var(--acc2);
      font-weight: 700;
    }

    .bc-row-sub {
      font-size: .62rem;
      color: var(--acc);
      opacity: .7;
      margin-top: 2px;
    }

    .bc-row-bar {
      height: 4px;
      background: color-mix(in srgb, var(--text) 6%, transparent);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 7px;
    }

    .bc-row-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--acc), var(--acc2));
      width: 0;
      transition: width 1.15s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .bc-row-score {
      text-align: right;
      flex-shrink: 0;
      min-width: 78px;
    }

    .bc-row-count {
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.1;
    }

    .bc-row--leader .bc-row-count {
      color: var(--acc);
      font-size: 1.38rem;
    }

    .bc-row-pct {
      font-size: .58rem;
      color: color-mix(in srgb, var(--text) 36%, transparent);
      margin-top: 2px;
    }

    /* ── SPOKESPERSON ── */
    #spokeArea {
      grid-column: 2;
      grid-row: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 32px 44px 24px 18px;
      position: relative;
    }

    .layout-full #spokeArea,
    .layout-minimal #spokeArea {
      display: none !important;
    }

    #spokeArea::before {
      content: '';
      position: absolute;
      top: 32px;
      bottom: 32px;
      left: 0;
      width: 1px;
      background: linear-gradient(180deg, transparent, color-mix(in srgb, var(--acc) 28%, transparent)18%, color-mix(in srgb, var(--acc) 36%, transparent)50%, color-mix(in srgb, var(--acc) 28%, transparent)82%, transparent);
      animation: sg 4.5s ease-in-out infinite alternate;
    }

    @keyframes sg {
      from {
        opacity: .5
      }

      to {
        opacity: 1;
        filter: drop-shadow(0 0 6px var(--acc))
      }
    }

    .spoke-cam {
      width: 100%;
      flex: 1;
      max-height: 700px;
      border-radius: 18px;
      background: color-mix(in srgb, var(--surface) 45%, transparent);
      border: 1px solid color-mix(in srgb, var(--acc) 13%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: inset 0 0 80px color-mix(in srgb, var(--acc) 4%, transparent), 0 0 40px color-mix(in srgb, var(--acc) 6%, transparent);
    }

    .spoke-cam::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 18px;
      background: linear-gradient(180deg, color-mix(in srgb, var(--acc) 3%, transparent) 0%, transparent 30%, transparent 70%, color-mix(in srgb, var(--bg) 30%, transparent) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .spoke-cam-hint {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      opacity: .12;
      pointer-events: none;
      z-index: 0;
    }

    .spoke-cam-hint svg {
      color: var(--acc);
    }

    .spoke-cam-hint span {
      font-family: 'Cinzel', serif;
      font-size: .6rem;
      font-weight: 600;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--acc);
    }

    #spokeNameplate {
      display: none;
      flex-direction: column;
      align-items: center;
      background: color-mix(in srgb, var(--cardBg) 90%, transparent);
      border: 1px solid color-mix(in srgb, var(--acc) 26%, transparent);
      border-radius: 10px;
      padding: 11px 36px;
      margin-top: 14px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      text-align: center;
      width: 100%;
      box-shadow: 0 0 30px color-mix(in srgb, var(--acc) 8%, transparent);
      animation: npIn .55s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes npIn {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: none
      }
    }

    #spokeName {
      font-family: 'Cinzel', serif;
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: .1em;
    }

    #spokeRole {
      font-size: .66rem;
      font-weight: 500;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--acc);
      margin-top: 4px;
      opacity: .82;
    }

    /* ── BOTTOM BAR ── */
    .bbar {
      grid-column: 1/-1;
      grid-row: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 60px;
      background: color-mix(in srgb, var(--bg) 58%, transparent);
      border-top: 1px solid color-mix(in srgb, var(--acc) 11%, transparent);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
    }

    .bb-l {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .bb-gem {
      width: 7px;
      height: 7px;
      background: var(--acc);
      transform: rotate(45deg);
      box-shadow: 0 0 8px color-mix(in srgb, var(--acc) 50%, transparent);
    }

    .bb-brand {
      font-family: 'Cinzel', serif;
      font-size: .58rem;
      font-weight: 700;
      letter-spacing: .26em;
      text-transform: uppercase;
      color: var(--acc);
      opacity: .65;
    }

    .bb-pipe {
      width: 1px;
      height: 14px;
      background: color-mix(in srgb, var(--acc) 14%, transparent);
    }

    .bb-url {
      font-size: .58rem;
      letter-spacing: .1em;
      color: color-mix(in srgb, var(--text) 24%, transparent);
    }

    #bbMid {
      flex: 1;
      text-align: center;
      font-family: 'Cinzel', serif;
      font-size: .62rem;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: color-mix(in srgb, var(--acc) 48%, transparent);
    }

    .bb-r {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bb-cdot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: color-mix(in srgb, var(--acc) 25%, transparent);
    }
  </style>
</head>

<body>
  <div id="scaleRoot">
    <canvas id="auroraCanvas"></canvas>
    <div class="bg-vig"></div>
    <div class="bg-scan"></div>
    <div class="top-accent"></div>
    <div class="brk brk-tl"></div>
    <div class="brk brk-tr"></div>
    <div class="brk brk-bl"></div>
    <div class="brk brk-br"></div>
    <div id="voteFlash"></div>
    <div id="partLayer"></div>

    <div id="leaderBanner">
      <div class="lcb-eyebrow">Novo Líder</div>
      <div class="lcb-headline">Passou à frente</div>
      <div class="lcb-name"></div>
      <div class="lcb-cat"></div>
    </div>

    <div class="stage layout-split" id="mainStage">
      <div class="topbar">
        <div class="tb-l">
          <span class="tb-brand">Grupo Armindo</span>
          <div class="tb-pipe"></div>
          <span id="bcTitle">VOTAÇÃO</span>
        </div>
        <div class="tb-r">
          <div id="totalBox" style="display:flex">
            <span class="tb-tn" id="totalCount">0</span>
            <span class="tb-tl">votos</span>
          </div>
          <div class="tb-pipe"></div>
          <div class="live-dot off" id="liveDot"></div>
          <span class="status-tag" id="statusTag">ENCERRADO</span>
          <div class="tb-pipe"></div>
          <span class="bc-clock bc-clock-wrap"></span>
        </div>
      </div>

      <div class="lb-col">
        <div id="bcEyebrow" class="cat-eyebrow">Resultados em Tempo Real</div>
        <div id="bcCatLabel">A carregar…</div>
        <div class="cat-sep">
          <div class="sep-line"></div>
          <div class="sep-diamond"></div>
          <div class="sep-line sep-line-r"></div>
        </div>
        <div id="rowsContainer" class="rows-container style-card"></div>
      </div>

      <div id="spokeArea">
        <div class="spoke-cam">
          <div class="spoke-cam-hint">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"
              stroke-linecap="round">
              <path d="M23 7l-7 5 7 5V7z" />
              <rect x="1" y="5" width="15" height="14" rx="2" />
            </svg>
            <span>Câmara / Spokesperson</span>
          </div>
        </div>
        <div id="spokeNameplate">
          <div id="spokeName"></div>
          <div id="spokeRole"></div>
        </div>
      </div>

      <div class="bbar">
        <div class="bb-l">
          <div class="bb-gem"></div>
          <span class="bb-brand">Grupo Armindo</span>
          <div class="bb-pipe"></div>
          <span class="bb-url" id="bbUrl">vote.grupoarmindo.me</span>
        </div>
        <div id="bbMid"></div>
        <div class="bb-r">
          <div class="bb-cdot"></div>
          <span class="bc-clock bc-clock-wrap"
            style="font-family:'Cinzel',serif;font-size:.66rem;letter-spacing:.1em;color:color-mix(in srgb,var(--text) 24%,transparent)"></span>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
