<!DOCTYPE html>
<html lang="pt">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Broadcast — Grupo Armindo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Jost:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap"
    rel="stylesheet" />

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA8azNy6GEgD190y_fW91ahUbKa1w5veik",
      authDomain: "aawards.firebaseapp.com",
      databaseURL: "https://aawards-default-rtdb.firebaseio.com",
      projectId: "aawards",
      storageBucket: "aawards.firebasestorage.app",
      messagingSenderId: "839334918366",
      appId: "1:839334918366:web:454a259fa3e2665b46ea4f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let configData = null;
    let votesData = {};
    let prevTotal = 0;
    let voteFlashTimeout = null;
    let prevLeader = null;

    /* ── CLOCK ── */
    function startClock() {
      function tick() {
        const now = new Date();
        const t = [now.getHours(), now.getMinutes(), now.getSeconds()].map(v => String(v).padStart(2, '0')).join(':');
        document.querySelectorAll('.live-clock').forEach(el => el.textContent = t);
      }
      tick(); setInterval(tick, 1000);
    }

    /* ── ANIMATED COUNTER ── */
    function animateCount(el, from, to, ms = 1100) {
      if (from === to) return;
      const start = performance.now();
      const d = to - from;
      function step(now) {
        const t = Math.min((now - start) / ms, 1);
        const e = 1 - Math.pow(1 - t, 4);
        el.textContent = Math.round(from + d * e).toLocaleString('pt-PT');
        if (t < 1) requestAnimationFrame(step);
        else el.textContent = to.toLocaleString('pt-PT');
      }
      requestAnimationFrame(step);
    }

    /* ── THEME ── */
    function applyTheme(t) {
      if (!t) return;
      const r = document.documentElement;
      r.style.setProperty('--accent', t.accent || '#c4973a');
      r.style.setProperty('--accent2', t.accent2 || '#e8d5a3');
      r.style.setProperty('--bg', t.bg || '#07060e');
    }

    /* ── VOTE FLASH ── */
    function flashVote() {
      const el = document.getElementById('voteFlash');
      el.classList.add('active');
      clearTimeout(voteFlashTimeout);
      voteFlashTimeout = setTimeout(() => el.classList.remove('active'), 600);
      spawnVoteParticle();
    }

    /* ── SPAWN VOTE PARTICLE ── */
    function spawnVoteParticle() {
      const container = document.getElementById('particleLayer');
      const colors = ['var(--accent)', 'var(--accent2)', '#fff8e0'];
      for (let i = 0; i < 8; i++) {
        const p = document.createElement('div');
        p.className = 'vote-particle';
        const color = colors[Math.floor(Math.random() * colors.length)];
        const x = 80 + Math.random() * 340;
        const y = 700 + Math.random() * 200;
        const drift = (Math.random() - 0.5) * 140;
        const size = Math.random() * 6 + 2;
        p.style.cssText = `left:${x}px;top:${y}px;width:${size}px;height:${size}px;background:${color};--drift:${drift}px;animation-duration:${Math.random() * 0.8 + 0.9}s;animation-delay:${Math.random() * 0.2}s;`;
        container.appendChild(p);
        setTimeout(() => p.remove(), 1400);
      }
    }

    /* ── LEADER CHANGE FLASH ── */
    function checkLeaderChange(newLeader) {
      if (prevLeader && prevLeader !== newLeader && newLeader) {
        const el = document.getElementById('leaderChangeBanner');
        el.querySelector('.lcb-name').textContent = newLeader;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 4000);
      }
      prevLeader = newLeader;
    }

    /* ── MAIN RENDER ── */
    function render(config, votes) {
      applyTheme(config.theme);
      document.getElementById('evTitle').textContent = config.title || 'VOTAÇÃO';
      document.getElementById('evSub').textContent = config.subtitle || '';
      document.getElementById('footerEventName').textContent = config.title || '';

      const sid = config.sessionId || 'default';
      const sv = (votes[sid] && votes[sid].votes) || {};

      const candidates = config.candidates || [];
      const sorted = [...candidates].map(c => ({ ...c, count: sv[c.id] || 0 })).sort((a, b) => b.count - a.count);
      const total = sorted.reduce((s, c) => s + c.count, 0);

      if (total > prevTotal) flashVote();
      animateCount(document.getElementById('totalVotesDisplay'), prevTotal, total);
      prevTotal = total;

      const isOpen = config.votingOpen || false;
      document.getElementById('liveDot').className = 'live-dot ' + (isOpen ? 'on' : 'off');
      document.getElementById('statusTag').textContent = isOpen ? 'AO VIVO' : 'ENCERRADO';
      document.getElementById('statusTag').className = 'status-tag ' + (isOpen ? 'live' : 'closed');

      /* HERO */
      const w = sorted[0];
      if (w) {
        checkLeaderChange(w.name);
        const wp = total ? (w.count / total * 100).toFixed(1) : 0;
        document.getElementById('heroName').textContent = w.name;
        document.getElementById('heroSub').textContent = w.subtitle || '';
        document.getElementById('heroVotes').textContent = w.count.toLocaleString('pt-PT');
        document.getElementById('heroPct').textContent = wp + '%';
        const img = document.getElementById('heroImg');
        const init = document.getElementById('heroInitial');
        if (w.photo) { img.src = w.photo; img.style.display = 'block'; init.style.display = 'none'; }
        else { img.style.display = 'none'; init.style.display = 'flex'; init.textContent = w.name.charAt(0).toUpperCase(); }
        setTimeout(() => { const b = document.getElementById('heroBar'); if (b) b.style.width = wp + '%'; }, 80);
      }

      /* LEADERBOARD */
      const board = document.getElementById('leaderboard');
      board.innerHTML = '';
      sorted.slice(1, 9).forEach((c, i) => {
        const p = total ? (c.count / total * 100).toFixed(1) : 0;
        const row = document.createElement('div');
        row.className = 'lb-row';
        row.style.setProperty('--i', i);
        row.innerHTML = `
          <div class="lb-rank">${String(i + 2).padStart(2, '0')}</div>
          <div class="lb-photo">${c.photo ? `<img src="${c.photo}"/>` : `<div class="lb-initial">${c.name.charAt(0)}</div>`}</div>
          <div class="lb-info">
            <div class="lb-name">${c.name}</div>
            ${c.subtitle ? `<div class="lb-sub">${c.subtitle}</div>` : ''}
            <div class="lb-track"><div class="lb-fill" style="width:0%"></div></div>
          </div>
          <div class="lb-right">
            <div class="lb-votes">${c.count.toLocaleString('pt-PT')}</div>
            <div class="lb-pct">${p}%</div>
          </div>`;
        board.appendChild(row);
        requestAnimationFrame(() => setTimeout(() => {
          const f = row.querySelector('.lb-fill'); if (f) f.style.width = p + '%';
        }, 80 + i * 50));
      });
    }

    /* ── AURORA / STAR CANVAS ── */
    function initCanvas() {
      const c = document.getElementById('bgCanvas');
      if (!c) return;
      const ctx = c.getContext('2d');
      c.width = 1920; c.height = 1080;

      // Stars
      const stars = Array.from({ length: 180 }, () => ({
        x: Math.random() * 1920, y: Math.random() * 1080,
        r: Math.random() * 1.4 + 0.2,
        a: Math.random() * 0.6 + 0.05,
        da: (Math.random() - 0.5) * 0.004,
        vx: (Math.random() - 0.5) * 0.08,
        vy: (Math.random() - 0.5) * 0.05,
      }));

      // Aurora waves
      let t = 0;

      function loop() {
        ctx.clearRect(0, 0, 1920, 1080);
        t += 0.006;

        // Aurora layers
        const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#c4973a';
        const h = parseInt(accent.slice(1, 3), 16);

        for (let layer = 0; layer < 3; layer++) {
          const phase = t + layer * 1.2;
          const yBase = 200 + layer * 120 + Math.sin(phase * 0.7) * 60;
          const grad = ctx.createLinearGradient(0, yBase - 120, 0, yBase + 120);
          const alpha = [0.06, 0.04, 0.03][layer];
          grad.addColorStop(0, 'transparent');
          grad.addColorStop(0.4, `rgba(${h},${Math.min(h + 40, 255)},40, ${alpha})`);
          grad.addColorStop(0.6, `rgba(${Math.min(h + 20, 255)},${h},20, ${alpha * 0.7})`);
          grad.addColorStop(1, 'transparent');

          ctx.beginPath();
          ctx.moveTo(0, yBase);
          for (let x = 0; x <= 1920; x += 8) {
            const y = yBase + Math.sin(x * 0.003 + phase) * 55 + Math.sin(x * 0.007 + phase * 1.3) * 30;
            ctx.lineTo(x, y);
          }
          ctx.lineTo(1920, 1080); ctx.lineTo(0, 1080); ctx.closePath();
          ctx.fillStyle = grad;
          ctx.fill();
        }

        // Stars
        stars.forEach(s => {
          s.x += s.vx; s.y += s.vy;
          s.a += s.da;
          if (s.a < 0.03 || s.a > 0.65) s.da *= -1;
          if (s.x < -2) s.x = 1922; if (s.x > 1922) s.x = -2;
          if (s.y < -2) s.y = 1082; if (s.y > 1082) s.y = -2;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fillStyle = accent;
          ctx.globalAlpha = s.a;
          ctx.fill();
        });
        ctx.globalAlpha = 1;
        requestAnimationFrame(loop);
      }
      loop();
    }

    document.addEventListener('DOMContentLoaded', () => { startClock(); initCanvas(); });
    onValue(ref(db, 'config'), snap => { configData = snap.val() || {}; render(configData, votesData); });
    onValue(ref(db, 'sessions'), snap => { votesData = snap.val() || {}; if (configData) render(configData, votesData); });
  </script>

  <style>
    :root {
      --accent: #c4973a;
      --accent2: #e8d5a3;
      --bg: #07060e;
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: #ede9e0;
      font-family: 'Jost', sans-serif;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      position: relative;
      -webkit-font-smoothing: antialiased;
    }

    /* ── BG STACK ── */
    #bgCanvas {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.9;
    }

    /* Radial mesh glows */
    .bg-mesh {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        radial-gradient(ellipse 100% 80% at 108% -20%, color-mix(in srgb, var(--accent) 20%, transparent), transparent 52%),
        radial-gradient(ellipse 65% 65% at -10% 115%, color-mix(in srgb, var(--accent) 9%, transparent), transparent 55%),
        radial-gradient(ellipse 40% 40% at 50% 50%, color-mix(in srgb, #7b5fec 6%, transparent), transparent 60%);
      animation: meshDrift 18s ease-in-out infinite alternate;
    }

    @keyframes meshDrift {
      from {
        transform: scale(1) translate(0, 0);
      }

      to {
        transform: scale(1.04) translate(-1%, 1.5%);
      }
    }

    /* Deep vignette */
    .vignette {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: radial-gradient(ellipse 130% 115% at 50% 50%, transparent 30%, rgba(0, 0, 0, 0.68) 100%);
    }

    /* Horizontal light bar at top */
    .top-light {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      z-index: 8;
      background: linear-gradient(90deg,
          transparent 0%,
          transparent 5%,
          color-mix(in srgb, var(--accent) 50%, transparent) 15%,
          var(--accent) 35%,
          var(--accent2) 50%,
          var(--accent) 65%,
          color-mix(in srgb, var(--accent) 50%, transparent) 85%,
          transparent 95%,
          transparent 100%);
      animation: topLightSweep 6s ease-in-out infinite alternate;
    }

    @keyframes topLightSweep {
      0% {
        opacity: 0.5;
        filter: blur(0px);
      }

      50% {
        opacity: 1;
        filter: blur(1px);
      }

      100% {
        opacity: 0.6;
        filter: blur(0px);
      }
    }

    /* Scanlines */
    .scanlines {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      opacity: 0.018;
      background: repeating-linear-gradient(0deg, transparent 0, transparent 3px, rgba(0, 0, 0, 1) 3px, rgba(0, 0, 0, 1) 4px);
    }

    /* Vote flash overlay */
    #voteFlash {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      background: radial-gradient(ellipse 70% 70% at 50% 50%, color-mix(in srgb, var(--accent) 18%, transparent), transparent);
      opacity: 0;
      transition: opacity 0.07s;
    }

    #voteFlash.active {
      opacity: 1;
      transition: opacity 0s;
    }

    /* Particle layer */
    #particleLayer {
      position: absolute;
      inset: 0;
      z-index: 9;
      pointer-events: none;
      overflow: hidden;
    }

    .vote-particle {
      position: absolute;
      border-radius: 50%;
      animation: vp-rise linear forwards;
    }

    @keyframes vp-rise {
      0% {
        transform: translateY(0) translateX(0) scale(1);
        opacity: 1;
      }

      100% {
        transform: translateY(-260px) translateX(var(--drift)) scale(0.3);
        opacity: 0;
      }
    }

    /* Corner brackets — elegantly large */
    .brk {
      position: absolute;
      z-index: 7;
      width: 36px;
      height: 36px;
    }

    .brk-tl {
      top: 24px;
      left: 24px;
      border-top: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
      border-left: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
    }

    .brk-tr {
      top: 24px;
      right: 24px;
      border-top: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
      border-right: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
    }

    .brk-bl {
      bottom: 72px;
      left: 24px;
      border-bottom: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
      border-left: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
    }

    .brk-br {
      bottom: 72px;
      right: 24px;
      border-bottom: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
      border-right: 1px solid color-mix(in srgb, var(--accent) 45%, transparent);
    }

    /* ── STAGE ── */
    .stage {
      position: relative;
      z-index: 5;
      width: 1920px;
      height: 1022px;
      display: grid;
      grid-template-columns: 510px 1fr;
    }

    /* ══════════ LEFT COL ══════════ */
    .left-col {
      display: flex;
      flex-direction: column;
      padding: 52px 0 44px 60px;
      position: relative;
    }

    /* Glowing vertical separator */
    .left-col::after {
      content: '';
      position: absolute;
      right: 0;
      top: 60px;
      bottom: 60px;
      width: 1px;
      background: linear-gradient(180deg,
          transparent 0%,
          color-mix(in srgb, var(--accent) 0%, transparent) 5%,
          color-mix(in srgb, var(--accent) 35%, transparent) 20%,
          color-mix(in srgb, var(--accent) 40%, transparent) 50%,
          color-mix(in srgb, var(--accent) 35%, transparent) 80%,
          color-mix(in srgb, var(--accent) 0%, transparent) 95%,
          transparent 100%);
      animation: sepGlow 4s ease-in-out infinite alternate;
    }

    @keyframes sepGlow {
      from {
        opacity: 0.6;
      }

      to {
        opacity: 1;
        filter: drop-shadow(0 0 4px var(--accent));
      }
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 13px;
      margin-bottom: 40px;
    }

    .brand-gem {
      width: 9px;
      height: 9px;
      background: var(--accent);
      transform: rotate(45deg);
      opacity: 0.8;
      flex-shrink: 0;
      box-shadow: 0 0 12px var(--accent);
    }

    .brand-text {
      font-family: 'Cinzel', serif;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.8;
    }

    .live-row {
      display: flex;
      align-items: center;
      gap: 11px;
      margin-bottom: 32px;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .live-dot.on {
      background: #4fdb82;
      box-shadow: 0 0 0 4px rgba(79, 219, 130, 0.22), 0 0 16px rgba(79, 219, 130, 0.5);
      animation: livePulse 2s ease infinite;
    }

    .live-dot.off {
      background: #dd4444;
      box-shadow: none;
    }

    @keyframes livePulse {

      0%,
      100% {
        box-shadow: 0 0 0 3px rgba(79, 219, 130, 0.18), 0 0 10px rgba(79, 219, 130, 0.4);
      }

      50% {
        box-shadow: 0 0 0 9px rgba(79, 219, 130, 0), 0 0 22px rgba(79, 219, 130, 0.2);
      }
    }

    .status-tag {
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      padding: 5px 16px;
      border-radius: 100px;
    }

    .status-tag.live {
      background: rgba(79, 219, 130, 0.1);
      color: #4fdb82;
      border: 1px solid rgba(79, 219, 130, 0.28);
    }

    .status-tag.closed {
      background: rgba(200, 80, 80, 0.1);
      color: #dd4444;
      border: 1px solid rgba(200, 80, 80, 0.22);
    }

    .event-block {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .eyebrow {
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.5;
      margin-bottom: 16px;
    }

    #evTitle {
      font-family: 'Cinzel', serif;
      font-size: 3.8rem;
      font-weight: 900;
      line-height: 0.96;
      letter-spacing: 0.01em;
      color: #ede9e0;
      margin-bottom: 18px;
      text-shadow:
        0 0 100px color-mix(in srgb, var(--accent) 38%, transparent),
        0 0 30px color-mix(in srgb, var(--accent) 18%, transparent),
        0 2px 0 rgba(0, 0, 0, 0.6);
    }

    #evSub {
      font-size: 0.92rem;
      font-weight: 300;
      font-style: italic;
      color: var(--accent);
      letter-spacing: 0.06em;
      opacity: 0.78;
      margin-bottom: 44px;
      min-height: 1.4em;
    }

    /* ── COUNTER BOX ── */
    .counter-box {
      background:
        linear-gradient(135deg,
          color-mix(in srgb, var(--accent) 8%, rgba(255, 255, 255, 0.02)),
          color-mix(in srgb, var(--accent) 3%, rgba(255, 255, 255, 0.01)));
      border: 1px solid color-mix(in srgb, var(--accent) 24%, transparent);
      border-radius: 20px;
      padding: 24px 28px;
      position: relative;
      overflow: hidden;
      margin-bottom: 24px;
      box-shadow:
        inset 0 1px 0 color-mix(in srgb, var(--accent) 18%, transparent),
        0 20px 60px -20px color-mix(in srgb, var(--accent) 20%, transparent);
    }

    /* Animated shimmer line */
    .counter-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      right: -100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent) 30%, var(--accent2) 50%, var(--accent) 70%, transparent);
      animation: shimLine 3.5s linear infinite;
    }

    @keyframes shimLine {
      from {
        transform: translateX(-50%);
      }

      to {
        transform: translateX(50%);
      }
    }

    /* Inner glow blob */
    .counter-box::after {
      content: '';
      position: absolute;
      right: -30px;
      top: -30px;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, color-mix(in srgb, var(--accent) 10%, transparent), transparent 70%);
      pointer-events: none;
    }

    .counter-label {
      font-size: 0.56rem;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.5;
      margin-bottom: 8px;
    }

    #totalVotesDisplay {
      font-family: 'Cinzel', serif;
      font-size: 5.5rem;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -0.02em;
      text-shadow:
        0 0 80px color-mix(in srgb, var(--accent) 50%, transparent),
        0 0 20px color-mix(in srgb, var(--accent) 30%, transparent);
      position: relative;
      z-index: 1;
    }

    .counter-footer {
      font-size: 0.6rem;
      color: #3a3548;
      letter-spacing: 0.1em;
      margin-top: 8px;
      text-transform: uppercase;
    }

    /* Clock line */
    .clock-line {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .clock-gem {
      width: 4px;
      height: 4px;
      background: var(--accent);
      transform: rotate(45deg);
      opacity: 0.35;
    }

    .live-clock {
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      letter-spacing: 0.16em;
      color: #3a3548;
    }

    /* ══════════ RIGHT COL ══════════ */
    .right-col {
      display: flex;
      flex-direction: column;
      padding: 52px 60px 40px 48px;
      gap: 18px;
    }

    /* ── HERO CARD ── */
    .hero-card {
      flex-shrink: 0;
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-rows: auto auto;
      column-gap: 30px;
      background:
        linear-gradient(135deg,
          color-mix(in srgb, var(--accent) 11%, rgba(255, 255, 255, 0.03)),
          color-mix(in srgb, var(--accent) 4%, rgba(255, 255, 255, 0.01)));
      border: 1px solid color-mix(in srgb, var(--accent) 32%, transparent);
      border-radius: 24px;
      padding: 22px 28px;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 0 80px -20px color-mix(in srgb, var(--accent) 35%, transparent),
        inset 0 1px 0 color-mix(in srgb, var(--accent2) 20%, transparent);
    }

    /* Animated shimmer top edge */
    .hero-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      right: -100%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent) 25%, var(--accent2) 50%, var(--accent) 75%, transparent);
      animation: shimCard 3.5s linear infinite;
    }

    @keyframes shimCard {
      from {
        transform: translateX(-30%);
      }

      to {
        transform: translateX(30%);
      }
    }

    /* Ambient glow top-right */
    .hero-card::after {
      content: '';
      position: absolute;
      right: -40px;
      top: -40px;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      background: radial-gradient(circle, color-mix(in srgb, var(--accent) 14%, transparent), transparent 65%);
      pointer-events: none;
      animation: blobDrift 8s ease-in-out infinite alternate;
    }

    @keyframes blobDrift {
      from {
        transform: translate(0, 0) scale(1);
      }

      to {
        transform: translate(-20px, 10px) scale(1.1);
      }
    }

    .hero-photo-col {
      grid-column: 1;
      grid-row: 1/3;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .hero-place {
      font-size: 0.52rem;
      font-weight: 700;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.55;
    }

    .hero-photo {
      width: 130px;
      height: 130px;
      border-radius: 18px;
      overflow: hidden;
      border: 2px solid color-mix(in srgb, var(--accent) 44%, transparent);
      box-shadow:
        0 0 0 6px color-mix(in srgb, var(--accent) 10%, transparent),
        0 12px 50px -8px color-mix(in srgb, var(--accent) 40%, transparent);
      background: rgba(255, 255, 255, 0.04);
      position: relative;
      flex-shrink: 0;
    }

    #heroImg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    #heroInitial {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 3rem;
      font-weight: 900;
      color: var(--accent);
      opacity: 0.18;
    }

    /* Pulsing ring around hero photo */
    .hero-photo::after {
      content: '';
      position: absolute;
      inset: -10px;
      border-radius: 26px;
      border: 1px solid color-mix(in srgb, var(--accent) 22%, transparent);
      animation: ringPulse 3.5s ease infinite;
    }

    @keyframes ringPulse {

      0%,
      100% {
        opacity: 0.3;
        transform: scale(1);
      }

      50% {
        opacity: 0.9;
        transform: scale(1.05);
      }
    }

    .hero-info {
      grid-column: 2;
      grid-row: 1;
      align-self: center;
      padding-bottom: 10px;
    }

    .hero-badge {
      font-size: 0.55rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.5;
      margin-bottom: 10px;
    }

    #heroName {
      font-family: 'Cinzel', serif;
      font-size: 2.1rem;
      font-weight: 900;
      color: var(--accent2);
      line-height: 1.04;
      letter-spacing: 0.02em;
      text-shadow:
        0 0 50px color-mix(in srgb, var(--accent) 38%, transparent),
        0 0 12px color-mix(in srgb, var(--accent) 15%, transparent);
      margin-bottom: 6px;
    }

    #heroSub {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.58;
    }

    .hero-metrics {
      grid-column: 2;
      grid-row: 2;
    }

    .hero-nums {
      display: flex;
      align-items: baseline;
      gap: 20px;
      margin-bottom: 12px;
    }

    #heroVotes {
      font-family: 'Cinzel', serif;
      font-size: 2.8rem;
      font-weight: 900;
      color: var(--accent);
      text-shadow: 0 0 40px color-mix(in srgb, var(--accent) 50%, transparent);
      line-height: 1;
    }

    .hero-vl {
      font-size: 0.62rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #3a3548;
    }

    #heroPct {
      font-family: 'Cinzel', serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: color-mix(in srgb, var(--accent) 70%, transparent);
    }

    .hero-bar-track {
      height: 6px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      overflow: hidden;
    }

    #heroBar {
      height: 100%;
      width: 0;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: width 1.2s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 60%, transparent);
    }

    /* Section divider */
    .sec-div {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-shrink: 0;
    }

    .sec-div span {
      font-size: 0.54rem;
      font-weight: 700;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.42;
      white-space: nowrap;
    }

    .sec-div::before,
    .sec-div::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--accent) 15%, transparent));
    }

    .sec-div::before {
      background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 15%, transparent), transparent);
    }

    /* ── LEADERBOARD ── */
    #leaderboard {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 7px;
      overflow: hidden;
    }

    .lb-row {
      display: flex;
      align-items: center;
      gap: 13px;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid rgba(255, 255, 255, 0.044);
      border-radius: 13px;
      padding: 11px 16px;
      animation: lbIn 0.5s calc(var(--i, 0)*0.07s) cubic-bezier(0.22, 1, 0.36, 1) both;
      transition: background 0.3s;
    }

    @keyframes lbIn {
      from {
        opacity: 0;
        transform: translateX(28px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .lb-rank {
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      font-weight: 700;
      color: #3a3548;
      letter-spacing: 0.08em;
      width: 26px;
      text-align: center;
      flex-shrink: 0;
    }

    .lb-photo {
      width: 48px;
      height: 48px;
      border-radius: 9px;
      overflow: hidden;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.04);
    }

    .lb-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .lb-initial {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cinzel', serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--accent);
      opacity: 0.18;
    }

    .lb-info {
      flex: 1;
      min-width: 0;
    }

    .lb-name {
      font-family: 'Cinzel', serif;
      font-size: 0.88rem;
      font-weight: 600;
      color: #cec9c0;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .lb-sub {
      font-size: 0.58rem;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: #3a3548;
      margin-bottom: 7px;
    }

    .lb-track {
      height: 3px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 3px;
      overflow: hidden;
    }

    .lb-fill {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 60%, transparent), var(--accent));
      border-radius: 3px;
      transition: width 0.95s cubic-bezier(0.22, 1, 0.36, 1);
    }

    .lb-right {
      text-align: right;
      flex-shrink: 0;
      min-width: 72px;
    }

    .lb-votes {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      font-weight: 700;
      color: var(--accent);
    }

    .lb-pct {
      font-size: 0.6rem;
      color: #3a3548;
      letter-spacing: 0.06em;
      margin-top: 2px;
    }

    /* ── LEADER CHANGE BANNER ── */
    #leaderChangeBanner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0.85);
      z-index: 20;
      background: linear-gradient(135deg,
          color-mix(in srgb, var(--accent) 15%, rgba(7, 6, 14, 0.96)),
          color-mix(in srgb, var(--accent) 5%, rgba(7, 6, 14, 0.98)));
      border: 1px solid color-mix(in srgb, var(--accent) 50%, transparent);
      border-radius: 24px;
      padding: 36px 56px;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s, transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 0 120px -20px color-mix(in srgb, var(--accent) 50%, transparent);
    }

    #leaderChangeBanner.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .lcb-eyebrow {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.7;
      margin-bottom: 12px;
    }

    .lcb-headline {
      font-family: 'Cinzel', serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #ede9e0;
      margin-bottom: 8px;
    }

    .lcb-name {
      font-family: 'Cinzel', serif;
      font-size: 2.4rem;
      font-weight: 900;
      color: var(--accent);
      text-shadow: 0 0 40px color-mix(in srgb, var(--accent) 55%, transparent);
    }

    /* ── CHROME BAR ── */
    .chrome-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 6;
      height: 58px;
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      border-top: 1px solid color-mix(in srgb, var(--accent) 14%, transparent);
      backdrop-filter: blur(16px);
      display: flex;
      align-items: center;
      padding: 0 60px;
    }

    /* Glowing accent line above chrome bar */
    .chrome-bar::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg,
          transparent 0%,
          color-mix(in srgb, var(--accent) 40%, transparent) 30%,
          color-mix(in srgb, var(--accent) 60%, transparent) 50%,
          color-mix(in srgb, var(--accent) 40%, transparent) 70%,
          transparent 100%);
      animation: chromeLine 5s ease-in-out infinite alternate;
    }

    @keyframes chromeLine {
      from {
        opacity: 0.5;
      }

      to {
        opacity: 1;
      }
    }

    .chrome-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .chrome-brand {
      font-family: 'Cinzel', serif;
      font-size: 0.58rem;
      font-weight: 700;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.7;
    }

    .chrome-pipe {
      width: 1px;
      height: 16px;
      background: color-mix(in srgb, var(--accent) 18%, transparent);
    }

    .chrome-url {
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      color: #3a3548;
    }

    .chrome-mid {
      flex: 1;
      text-align: center;
      font-size: 0.56rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #3a3548;
    }

    /* Animated QR placeholder dots */
    .chrome-qr-hint {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 0 32px;
      opacity: 0.45;
    }

    .chrome-qr-hint span {
      font-size: 0.56rem;
      letter-spacing: 0.1em;
      color: var(--accent);
      text-transform: uppercase;
    }

    .qr-arr {
      color: var(--accent);
      font-size: 0.7rem;
      animation: arrBounce 1.4s ease-in-out infinite;
    }

    @keyframes arrBounce {

      0%,
      100% {
        transform: translateX(0);
      }

      50% {
        transform: translateX(4px);
      }
    }

    .chrome-right {
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .chrome-clockdot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #3a3548;
      opacity: 0.5;
    }

    .chrome-clock {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 0.14em;
      color: #3a3548;
    }
  </style>
</head>

<body>

  <!-- BG -->
  <canvas id="bgCanvas"></canvas>
  <div class="bg-mesh"></div>
  <div class="vignette"></div>
  <div class="top-light"></div>
  <div class="scanlines"></div>
  <div id="voteFlash"></div>
  <div id="particleLayer"></div>

  <!-- CORNER BRACKETS -->
  <div class="brk brk-tl"></div>
  <div class="brk brk-tr"></div>
  <div class="brk brk-bl"></div>
  <div class="brk brk-br"></div>

  <!-- LEADER CHANGE BANNER -->
  <div id="leaderChangeBanner">
    <div class="lcb-eyebrow">Novo Líder</div>
    <div class="lcb-headline">Passou à frente</div>
    <div class="lcb-name"></div>
  </div>

  <!-- STAGE -->
  <div class="stage">

    <!-- ══ LEFT ══ -->
    <div class="left-col">
      <div class="brand-row">
        <div class="brand-gem"></div>
        <div class="brand-text">Grupo Armindo</div>
      </div>

      <div class="live-row">
        <div class="live-dot on" id="liveDot"></div>
        <span class="status-tag live" id="statusTag">AO VIVO</span>
      </div>

      <div class="event-block">
        <div class="eyebrow">Votação em Tempo Real</div>
        <div id="evTitle">A CARREGAR</div>
        <div id="evSub"></div>

        <div class="counter-box">
          <div class="counter-label">Votos Registados</div>
          <div id="totalVotesDisplay">0</div>
          <div class="counter-footer">Actualizado em tempo real</div>
        </div>

        <div class="clock-line">
          <div class="clock-gem"></div>
          <span class="live-clock">00:00:00</span>
        </div>
      </div>
    </div>

    <!-- ══ RIGHT ══ -->
    <div class="right-col">

      <!-- HERO -->
      <div class="hero-card">
        <div class="hero-photo-col">
          <div class="hero-place">1.º Lugar</div>
          <div class="hero-photo">
            <img id="heroImg" src="" alt="" />
            <div id="heroInitial"></div>
          </div>
        </div>

        <div class="hero-info">
          <div class="hero-badge">LÍDER ◆ CLASSIFICAÇÃO</div>
          <div id="heroName">—</div>
          <div id="heroSub"></div>
        </div>

        <div class="hero-metrics">
          <div class="hero-nums">
            <div id="heroVotes">0</div>
            <div class="hero-vl">votos</div>
            <div id="heroPct">0%</div>
          </div>
          <div class="hero-bar-track">
            <div id="heroBar"></div>
          </div>
        </div>
      </div>

      <!-- DIVIDER -->
      <div class="sec-div"><span>Classificação Geral</span></div>

      <!-- LEADERBOARD -->
      <div id="leaderboard"></div>

    </div>
  </div>

  <!-- CHROME BAR -->
  <div class="chrome-bar">
    <div class="chrome-left">
      <span class="chrome-brand">Grupo Armindo</span>
      <div class="chrome-pipe"></div>
      <span class="chrome-url">vote.grupoarmindo.me</span>
    </div>
    <div id="footerEventName" class="chrome-mid"></div>
    <div class="chrome-qr-hint">
      <span>Vote agora</span>
      <span class="qr-arr">›</span>
      <span style="color:#ede9e0;opacity:0.7">vote.grupoarmindo.me</span>
    </div>
    <div class="chrome-right">
      <div class="chrome-clockdot"></div>
      <span class="chrome-clock live-clock">00:00:00</span>
    </div>
  </div>

</body>

</html>
