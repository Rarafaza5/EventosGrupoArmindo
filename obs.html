<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1920, height=1080"/>
<title>Ultimate Broadcast — Eurovision Style</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&family=Syncopate:wght@400;700&family=Lexend:wght@300;600;800&display=swap" rel="stylesheet"/>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyA8azNy6GEgD190y_fW91ahUbKa1w5veik",
  authDomain: "aawards.firebaseapp.com",
  databaseURL: "https://aawards-default-rtdb.firebaseio.com",
  projectId: "aawards",
  storageBucket: "aawards.firebasestorage.app",
  messagingSenderId: "839334918366",
  appId: "1:839334918366:web:454a259fa3e2665b46ea4f"
};

const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

function applyTheme(t) {
  if (!t) return;
  const r = document.documentElement;
  r.style.setProperty('--accent', t.accent || '#c8a96e');
  r.style.setProperty('--accent2', t.accent2 || '#ecdcab');
  r.style.setProperty('--bg-base', t.bg || '#06050c');
  
  // Criar cor de brilho baseada no accent mas com transparência
  r.style.setProperty('--glow', `${t.accent}44`);
}

async function startReveal() {
  const configSnap = await get(ref(db, 'config'));
  const votesSnap  = await get(ref(db, 'votes'));
  
  const config = configSnap.val() || {};
  const votes  = votesSnap.val() || {};
  applyTheme(config.theme);

  const candidates = config.candidates || [];
  const sorted = [...candidates]
    .map(c => ({ ...c, count: votes[c.id] || 0 }))
    .sort((a, b) => b.count - a.count);

  const total = sorted.reduce((s, c) => s + c.count, 0);

  document.getElementById('evTitle').textContent = config.title || 'GRANDE FINAL';
  document.getElementById('evSub').textContent   = config.subtitle || 'RESULTADOS OFICIAIS';

  const grid = document.getElementById('resultsGrid');
  grid.innerHTML = '';

  // Renderizar Sequencial (Efeito de Suspense)
  sorted.forEach((c, i) => {
    const isWinner = i === 0;
    const pct = total ? (c.count / total * 100).toFixed(1) : 0;
    
    const el = document.createElement('div');
    el.className = `rank-card ${isWinner ? 'winner-card' : ''}`;
    el.style.setProperty('--delay', `${i * 0.1}s`);
    
    el.innerHTML = `
      <div class="card-glass"></div>
      <div class="rank-number">${i + 1}</div>
      <div class="photo-box">
         ${c.photo ? `<img src="${c.photo}" />` : `<div class="initial">${c.name[0]}</div>`}
         ${isWinner ? '<div class="crown-icon">🏆</div>' : ''}
      </div>
      <div class="main-info">
        <div class="name">${c.name}</div>
        <div class="sub">${c.subtitle || ''}</div>
      </div>
      <div class="stats">
        <div class="bar-track">
           <div class="bar-fill" style="width: 0%" data-p="${pct}"></div>
        </div>
        <div class="vals">
           <span class="pct-text">${pct}%</span>
           <span class="count-text">${c.count.toLocaleString('pt-PT')} VOTOS</span>
        </div>
      </div>
    `;
    grid.appendChild(el);

    // Animar Barras após entrada do card
    setTimeout(() => {
      el.querySelector('.bar-fill').style.width = pct + '%';
    }, 1000 + (i * 100));
  });
}

onValue(ref(db, 'config'), snap => startReveal());
</script>

<style>
:root {
  --accent: #c8a96e;
  --accent2: #ecdcab;
  --bg-base: #06050c;
  --glow: rgba(200, 169, 110, 0.3);
  --glass-white: rgba(255, 255, 255, 0.07);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  width: 1920px; height: 1080px;
  background: var(--bg-base);
  color: #fff;
  font-family: 'Lexend', sans-serif;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* --- CINEMATIC BACKGROUND --- */
#stage {
  position: fixed; inset: 0; z-index: -1;
  background: radial-gradient(circle at 50% -20%, color-mix(in srgb, var(--accent) 20%, transparent), transparent 70%);
}

.light-beam {
  position: absolute; top: -100px; width: 400px; height: 1200px;
  background: linear-gradient(to bottom, var(--glow), transparent);
  filter: blur(80px); transform-origin: top center;
  animation: beam-swing 10s ease-in-out infinite alternate;
}
.beam-1 { left: 20%; animation-delay: 0s; }
.beam-2 { right: 20%; animation-delay: -5s; }

@keyframes beam-swing {
  from { transform: rotate(-15deg); opacity: 0.3; }
  to { transform: rotate(15deg); opacity: 0.6; }
}

/* --- HEADER (EUROVISION STYLE) --- */
header {
  height: 200px;
  display: flex;
  align-items: center;
  padding: 0 80px;
  background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
}

.event-info h1 {
  font-family: 'Syncopate', sans-serif;
  font-size: 60px;
  font-weight: 700;
  letter-spacing: -2px;
  text-transform: uppercase;
  background: linear-gradient(45deg, #fff 30%, var(--accent) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 0 20px var(--glow));
}

.event-info p {
  font-size: 24px;
  color: var(--accent);
  letter-spacing: 12px;
  text-transform: uppercase;
  font-weight: 300;
}

/* --- RESULTS GRID --- */
.results-grid {
  flex: 1;
  padding: 20px 80px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.rank-card {
  height: 90px;
  display: flex;
  align-items: center;
  position: relative;
  border-radius: 8px;
  padding: 0 30px;
  opacity: 0;
  transform: translateX(-100px) skewX(-10deg);
  animation: card-in 0.8s var(--delay) forwards cubic-bezier(0.2, 1, 0.3, 1);
}

@keyframes card-in {
  to { opacity: 1; transform: translateX(0) skewX(0deg); }
}

.card-glass {
  position: absolute; inset: 0;
  background: var(--glass-white);
  backdrop-filter: blur(15px);
  border: 1px solid rgba(255,255,255,0.1);
  z-index: -1;
  border-radius: 8px;
  overflow: hidden;
}

.card-glass::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
  transform: translateX(-100%); animation: shimmer 4s infinite;
}

@keyframes shimmer { 100% { transform: translateX(100%); } }

/* --- THE WINNER CARD --- */
.winner-card {
  height: 180px;
  background: linear-gradient(90deg, color-mix(in srgb, var(--accent) 30%, transparent), var(--glass-white));
  border: 2px solid var(--accent);
  box-shadow: 0 0 50px var(--glow);
  margin-bottom: 20px;
}

.winner-card .rank-number { font-size: 80px; color: var(--accent); }
.winner-card .name { font-size: 54px; }
.winner-card .photo-box { width: 140px; height: 140px; }

/* --- COMPONENTS --- */
.rank-number {
  font-family: 'Montserrat', sans-serif;
  font-weight: 900;
  font-size: 32px;
  width: 80px;
  font-style: italic;
}

.photo-box {
  width: 70px; height: 70px;
  border-radius: 4px;
  margin-right: 30px;
  background: #111;
  border: 1px solid var(--accent);
  position: relative;
}

.photo-box img { width: 100%; height: 100%; object-fit: cover; }
.initial { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 900; }

.crown-icon {
  position: absolute; top: -15px; left: -15px;
  font-size: 30px; filter: drop-shadow(0 0 10px #fff);
}

.main-info { flex: 0 0 450px; }
.name { font-size: 28px; font-weight: 800; text-transform: uppercase; line-height: 1; }
.sub { color: var(--accent); font-size: 14px; margin-top: 5px; opacity: 0.8; }

.stats { flex: 1; margin-left: 40px; }
.bar-track {
  height: 12px; background: rgba(0,0,0,0.3);
  border-radius: 20px; overflow: hidden; margin-bottom: 8px;
}
.bar-fill {
  height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2));
  box-shadow: 0 0 15px var(--accent);
  transition: width 2s cubic-bezier(0.1, 1, 0.3, 1);
}

.vals { display: flex; justify-content: space-between; align-items: baseline; }
.pct-text { font-family: 'Montserrat'; font-weight: 900; font-size: 32px; }
.count-text { font-size: 12px; opacity: 0.6; letter-spacing: 2px; }

/* --- TICKER --- */
footer {
  height: 60px; background: rgba(0,0,0,0.9);
  display: flex; align-items: center; padding: 0 80px;
  font-family: 'Syncopate'; font-size: 14px;
}
.ticker { white-space: nowrap; overflow: hidden; flex: 1; color: var(--accent); }
</style>
</head>
<body>

  <div id="stage">
    <div class="light-beam beam-1"></div>
    <div class="light-beam beam-2"></div>
  </div>

  <header>
    <div class="event-info">
      <p id="evSub">A AGUARDAR...</p>
      <h1 id="evTitle">CARREGANDO DADOS</h1>
    </div>
  </header>

  <main class="results-grid" id="resultsGrid">
    <!-- JS POPULATES -->
  </main>

  <footer>
    <div class="ticker">
      ● RESULTADOS FINAIS ● CONTAGEM ENCERRADA ● AUDITADO EM TEMPO REAL ● RESULTADOS FINAIS ● CONTAGEM ENCERRADA
    </div>
    <div id="clock" style="font-weight: 700; color: #fff;">00:00:00</div>
  </footer>

  <script>
    function updateClock() {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString('pt-PT');
    }
    setInterval(updateClock, 1000);
    updateClock();
  </script>

</body>
</html>
