<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>Eurovision Reveal — Dynamic Scoreboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --accent: #FF3EDE;
      --text: #ffffff;
      --glass: rgba(0, 0, 0, 0.75);
      --glass-border: rgba(255, 255, 255, 0.15);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1920px;
      height: 1080px;
      background: #010204;
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
    }

    #waveBgCanvas {
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
    }

    .broadcast-layout {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 600px 1fr;
      padding: 100px;
      gap: 100px;
      position: relative;
      z-index: 10;
      align-items: start;
    }

    .camera-column {
      display: flex;
      flex-direction: column;
      gap: 40px;
      animation: slideInLeft 1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    .camera-frame {
      width: 100%;
      height: 750px;
      background: #00FF00;
      border: 8px solid var(--accent);
      border-radius: 40px;
      position: relative;
      box-shadow: 0 0 100px color-mix(in srgb, var(--accent) 35%, transparent);
    }

    .lower-third {
      width: 100%;
      background: var(--glass);
      backdrop-filter: blur(40px);
      border: 1px solid var(--glass-border);
      border-left: 12px solid var(--accent);
      padding: 30px 45px;
      border-radius: 12px 40px 40px 12px;
      box-shadow: 0 30px 60px rgba(0,0,0,0.6);
    }

    .lt-name { font-size: 2.5rem; font-weight: 950; line-height: 1; letter-spacing: -0.02em; }
    .lt-event { font-size: 1.1rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.3em; margin-top: 8px; opacity: 0.9; }

    .results-column {
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 40px;
      animation: fadeIn 1s 0.5s ease both;
    }

    .scoreboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      position: relative;
      flex: 1;
    }

    .score-row {
      height: 68px;
      background: var(--glass);
      backdrop-filter: blur(40px);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      display: flex;
      align-items: center;
      position: absolute;
      width: calc(50% - 15px);
      transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
    }

    .rank { 
      width: 68px; 
      background: rgba(255,255,255,0.06); 
      height: 100%; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      font-size: 1.5rem; 
      font-weight: 950; 
      border-right: 1px solid var(--glass-border);
      flex-shrink: 0;
      color: rgba(255,255,255,0.4);
    }

    .photo-box {
      width: 68px;
      height: 100%;
      flex-shrink: 0;
      border-right: 1px solid var(--glass-border);
    }
    .photo-box img { width: 100%; height: 100%; object-fit: cover; }

    .name { 
      flex: 1; 
      padding: 0 25px; 
      font-size: 1.5rem; 
      font-weight: 700; 
      white-space: nowrap; 
      overflow: hidden; 
      text-overflow: ellipsis; 
    }

    .pts { 
      width: 110px; 
      text-align: right; 
      padding-right: 30px; 
      font-size: 2rem; 
      font-weight: 950; 
      font-variant-numeric: tabular-nums; 
      flex-shrink: 0;
      opacity: 0.2; /* Dimmed when not revealed */
      transition: all 0.5s ease;
    }

    .score-row.revealed .pts {
      opacity: 1;
      color: var(--accent);
      text-shadow: 0 0 15px color-mix(in srgb, var(--accent) 50%, transparent);
    }

    .score-row.leader {
      border-color: var(--accent);
      background: color-mix(in srgb, var(--accent) 25%, var(--glass));
      box-shadow: 0 0 30px color-mix(in srgb, var(--accent) 15%, transparent);
    }
    .leader .rank { background: var(--accent); color: #fff; border: none; }

    #revealOverlay {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at center, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.96) 100%);
      backdrop-filter: blur(30px);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
    }

    .reveal-card {
      width: 1000px;
      background: var(--glass);
      border: 5px solid var(--accent);
      border-radius: 70px;
      padding: 100px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      box-shadow: 0 0 200px color-mix(in srgb, var(--accent) 50%, transparent);
      animation: revealPop 0.8s cubic-bezier(0.17, 0.89, 0.32, 1.49) both;
    }

    .reveal-badge { font-size: 1.8rem; font-weight: 950; color: var(--accent); text-transform: uppercase; letter-spacing: 0.6em; margin-bottom: 50px; }
    .reveal-photo { width: 450px; height: 450px; border-radius: 50%; border: 15px solid var(--accent); object-fit: cover; margin-bottom: 60px; box-shadow: 0 40px 100px rgba(0,0,0,0.8); }
    .reveal-name { font-size: 7rem; font-weight: 950; line-height: 1; letter-spacing: -0.04em; }

    /* ANIMATIONS */
    @keyframes slideInLeft { from { transform: translateX(-150px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes fadeIn { from { opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes revealPop { 0% { transform: scale(0.6); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

  </style>
</head>
<body>

  <canvas id="waveBgCanvas"></canvas>

  <div class="broadcast-layout">
    <div class="camera-column">
      <div class="camera-frame"></div>
      <div class="lower-third">
        <div class="lt-name" id="ltSpokesperson">Porta-voz</div>
        <div class="lt-event" id="ltEventName">Cargo</div>
      </div>
    </div>

    <div class="results-column">
      <div class="scoreboard-grid" id="scoreboardGrid"></div>
    </div>
  </div>

  <div id="revealOverlay">
    <div class="reveal-card">
      <div class="reveal-badge">Our 12 points go to...</div>
      <img id="revealPhoto" class="reveal-photo" src="" alt=""/>
      <div class="reveal-name" id="revealName">Candidato</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA8azNy6GEgD190y_fW91ahUbKa1w5veik",
      authDomain: "aawards.firebaseapp.com",
      databaseURL: "https://aawards-default-rtdb.firebaseio.com",
      projectId: "aawards",
      storageBucket: "aawards.firebasestorage.app",
      messagingSenderId: "839334918366",
      appId: "1:839334918366:web:454a259fa3e2665b46ea4f"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    let config = {};
    let votes = {};
    let lastRevealId = null;

    const ESC_POINTS = [12, 10, 8, 7, 6, 5, 4, 3, 2, 1];

    function renderScoreboard() {
      const candidates = config.candidates || [];
      const mode = config.broadcastMode || 'votes';
      const revealStatus = config.revealStatus || {};
      const revealActive = config.revealActive || false;

      // 1. Ordem Inicial (Running Order)
      const initialSorted = [...candidates].sort((a, b) => {
        const nA = parseInt(a.number) || 999;
        const nB = parseInt(b.number) || 999;
        return nA - nB;
      });

      // 2. Ranking Real Total
      let realRanking = [...candidates]
        .map(c => ({ ...c, raw: votes[c.id] || 0 }))
        .sort((a, b) => b.raw - a.raw);

      // 3. Processar cada candidato
      let processed = initialSorted.map((c, i) => {
        const isRevealed = !revealActive || revealStatus[c.id] === true;
        
        // Ranking idx para saber quantos pontos ele tem no total
        const rankIdx = realRanking.findIndex(r => r.id === c.id);
        
        // SÓ calculamos os pontos ESC se o candidato estiver revelado E tiver votos
        // Se não tiver votos, é sempre 0
        const hasVotes = realRanking[rankIdx].raw > 0;
        const finalValue = (isRevealed && hasVotes)
          ? (mode === 'points' ? (ESC_POINTS[rankIdx] || 0) : realRanking[rankIdx].raw)
          : 0;
        
        // displayValue para SORT: -1 se oculto (fica no fundo), finalValue se revelado
        const displayValue = isRevealed ? finalValue : -1;
        
        return { ...c, finalValue, displayValue, originalOrder: i, isRevealed };
      });

      // 4. Ordenar (Revealed primeiro, depois por pontos)
      processed.sort((a, b) => {
        if (b.displayValue !== a.displayValue) return b.displayValue - a.displayValue;
        return a.originalOrder - b.originalOrder;
      });

      const grid = document.getElementById('scoreboardGrid');
      const maxRows = Math.min(processed.length, 26);
      const half = Math.ceil(maxRows / 2);
      
      processed.forEach((c, i) => {
        if (i >= 26) return;

        let row = document.getElementById(`row-${c.id}`);
        if (!row) {
          row = document.createElement('div');
          row.id = `row-${c.id}`;
          row.className = 'score-row';
          row.innerHTML = `
            <div class="rank">${c.number || (i+1)}</div>
            <div class="photo-box">${c.photo ? `<img src="${c.photo}"/>` : ''}</div>
            <div class="name">${c.name}</div>
            <div class="pts">0</div>
          `;
          grid.appendChild(row);
        }

        const isRevealed = c.isRevealed;
        row.classList.toggle('revealed', isRevealed);
        row.classList.toggle('leader', i === 0 && isRevealed && c.displayValue > 0);

        const targetCol = i < half ? 0 : 1;
        const posInCol = i < half ? i : i - half;
        const xPos = targetCol * (grid.offsetWidth / 2 + 15);
        const yPos = posInCol * (68 + 12);

        row.style.transform = `translate(${xPos}px, ${yPos}px)`;
        row.querySelector('.rank').textContent = c.number || (i+1);
        row.querySelector('.pts').textContent = c.finalValue;
      });
    }

    onValue(ref(db, 'config'), snap => {
      config = snap.val() || {};
      document.getElementById('ltEventName').textContent = config.spokespersonRole || '';
      document.getElementById('ltSpokesperson').textContent = config.spokesperson || 'Porta-voz';

      if (config.theme && config.theme.accent) {
        document.documentElement.style.setProperty('--accent', config.theme.accent);
      }

      if (config.reveal && config.reveal.active) {
        if (lastRevealId !== config.reveal.candidateId) {
          showReveal(config.reveal.candidateId);
          lastRevealId = config.reveal.candidateId;
        }
      } else {
        document.getElementById('revealOverlay').style.display = 'none';
        lastRevealId = null;
      }
      renderScoreboard();
    });

    onValue(ref(db, 'votes'), snap => {
      votes = snap.val() || {};
      renderScoreboard();
    });

    function showReveal(cid) {
      const c = (config.candidates || []).find(x => x.id === cid);
      if (!c) return;
      document.getElementById('revealName').textContent = c.name;
      document.getElementById('revealPhoto').src = c.photo || '';
      document.getElementById('revealOverlay').style.display = 'flex';
    }

    (function(){
      const canvas = document.getElementById('waveBgCanvas');
      const ctx = canvas.getContext('2d');
      let W, H;
      function resize() { W = canvas.width = 1920; H = canvas.height = 1080; }
      resize();
      let time = 0;
      function draw() {
        ctx.globalAlpha = 1;
        ctx.clearRect(0, 0, W, H);
        time += 0.004;
        const accent = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#FF3EDE';
        
        // Fundo Sólido
        ctx.fillStyle = '#05070a'; 
        ctx.fillRect(0, 0, W, H);
        const NUM_LINES = 50; ctx.lineWidth = 1.8;
        for(let i=0; i<NUM_LINES; i++) {
          const p = i / (NUM_LINES - 1); ctx.strokeStyle = accent;
          const edgeFade = Math.sin(p * Math.PI); ctx.globalAlpha = edgeFade * 0.4;
          ctx.beginPath();
          for(let x=0; x<=W; x+=40) {
            const nx = x * 0.0007; const ny = p * 4;
            const noise = Math.sin(nx*2.5 + ny - time*1.2) * Math.cos(nx - ny + time) + Math.sin(nx*0.4 + time*0.5)*2;
            const yBase = H * -0.2 + (H * 1.4) * p; const amp = H * 0.14 * edgeFade;
            const y = yBase + noise * amp;
            if(x===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
          }
          ctx.stroke();
        }
        ctx.globalAlpha = 1;
        requestAnimationFrame(draw);
      }
      draw();
    })();
  </script>
</body>
</html>
