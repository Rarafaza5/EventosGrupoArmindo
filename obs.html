<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=1920, height=1080"/>
<title>Broadcast — Grupo Armindo</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Jost:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet"/>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA8azNy6GEgD190y_fW91ahUbKa1w5veik",
    authDomain: "aawards.firebaseapp.com",
    databaseURL: "https://aawards-default-rtdb.firebaseio.com",
    projectId: "aawards",
    storageBucket: "aawards.firebasestorage.app",
    messagingSenderId: "839334918366",
    appId: "1:839334918366:web:454a259fa3e2665b46ea4f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let configData = null;
  let votesData = {};
  let prevTotal = 0;
  let voteFlashTimeout = null;

  /* ── CLOCK ── */
  function startClock() {
    function tick() {
      const now = new Date();
      const t = [now.getHours(), now.getMinutes(), now.getSeconds()]
        .map(v => String(v).padStart(2,'0')).join(':');
      document.querySelectorAll('.live-clock').forEach(el => el.textContent = t);
    }
    tick(); setInterval(tick, 1000);
  }

  /* ── ANIMATED COUNTER ── */
  function animateCount(el, from, to, ms = 900) {
    if (from === to) return;
    const start = performance.now();
    const d = to - from;
    function step(now) {
      const t = Math.min((now - start) / ms, 1);
      const e = 1 - Math.pow(1 - t, 4);
      el.textContent = Math.round(from + d * e).toLocaleString('pt-PT');
      if (t < 1) requestAnimationFrame(step);
      else el.textContent = to.toLocaleString('pt-PT');
    }
    requestAnimationFrame(step);
  }

  /* ── THEME ── */
  function applyTheme(t) {
    if (!t) return;
    const r = document.documentElement;
    r.style.setProperty('--accent',  t.accent  || '#c4973a');
    r.style.setProperty('--accent2', t.accent2 || '#e8d5a3');
    r.style.setProperty('--bg',      t.bg      || '#06050f');
  }

  /* ── VOTE FLASH ── */
  function flashVote() {
    const el = document.getElementById('voteFlash');
    el.classList.add('active');
    clearTimeout(voteFlashTimeout);
    voteFlashTimeout = setTimeout(() => el.classList.remove('active'), 480);
  }

  /* ── MAIN RENDER ── */
  function render(config, votes) {
    applyTheme(config.theme);
    document.getElementById('evTitle').textContent = config.title || 'VOTAÇÃO';
    document.getElementById('evSub').textContent   = config.subtitle || '';

    const sid = config.sessionId || 'default';
    const sv  = (votes[sid] && votes[sid].votes) || {};

    const candidates = config.candidates || [];
    const sorted = [...candidates]
      .map(c => ({ ...c, count: sv[c.id] || 0 }))
      .sort((a, b) => b.count - a.count);
    const total = sorted.reduce((s, c) => s + c.count, 0);

    if (total > prevTotal) flashVote();
    animateCount(document.getElementById('totalVotesDisplay'), prevTotal, total);
    prevTotal = total;

    /* status */
    const isOpen = config.votingOpen || false;
    document.getElementById('liveDot').className    = 'live-dot ' + (isOpen ? 'on' : 'off');
    document.getElementById('statusTag').textContent = isOpen ? 'AO VIVO' : 'ENCERRADO';
    document.getElementById('statusTag').className   = 'status-tag ' + (isOpen ? 'live' : 'closed');

    /* ── HERO ── */
    const w = sorted[0];
    if (w) {
      const wp = total ? (w.count / total * 100).toFixed(1) : 0;
      document.getElementById('heroName').textContent   = w.name;
      document.getElementById('heroSub').textContent    = w.subtitle || '';
      document.getElementById('heroVotes').textContent  = w.count.toLocaleString('pt-PT');
      document.getElementById('heroPct').textContent    = wp + '%';
      const img  = document.getElementById('heroImg');
      const init = document.getElementById('heroInitial');
      if (w.photo) { img.src = w.photo; img.style.display = 'block'; init.style.display = 'none'; }
      else          { img.style.display = 'none'; init.style.display = 'flex'; init.textContent = w.name.charAt(0).toUpperCase(); }
      setTimeout(() => { const b = document.getElementById('heroBar'); if (b) b.style.width = wp + '%'; }, 80);
    }

    /* ── LEADERBOARD ── */
    const board = document.getElementById('leaderboard');
    board.innerHTML = '';
    sorted.slice(1, 8).forEach((c, i) => {
      const p = total ? (c.count / total * 100).toFixed(1) : 0;
      const row = document.createElement('div');
      row.className = 'lb-row';
      row.style.setProperty('--i', i);
      row.innerHTML = `
        <div class="lb-rank">${String(i+2).padStart(2,'0')}</div>
        <div class="lb-photo">${c.photo ? `<img src="${c.photo}"/>` : `<div class="lb-initial">${c.name.charAt(0)}</div>`}</div>
        <div class="lb-info">
          <div class="lb-name">${c.name}</div>
          ${c.subtitle ? `<div class="lb-sub">${c.subtitle}</div>` : ''}
          <div class="lb-track"><div class="lb-fill" style="width:0%"></div></div>
        </div>
        <div class="lb-right">
          <div class="lb-votes">${c.count.toLocaleString('pt-PT')}</div>
          <div class="lb-pct">${p}%</div>
        </div>`;
      board.appendChild(row);
      requestAnimationFrame(() => setTimeout(() => {
        const f = row.querySelector('.lb-fill'); if (f) f.style.width = p + '%';
      }, 100 + i * 55));
    });
  }

  /* ── PARTICLES ── */
  function initParticles() {
    const c = document.getElementById('pc'); if (!c) return;
    const ctx = c.getContext('2d');
    c.width = 1920; c.height = 1080;
    const pts = Array.from({length: 60}, () => ({
      x: Math.random()*1920, y: Math.random()*1080,
      r: Math.random()*1.5+.3,
      vx:(Math.random()-.5)*.22, vy:(Math.random()-.5)*.16-.05,
      a: Math.random()*.35+.05, da:(Math.random()-.5)*.003
    }));
    function loop() {
      ctx.clearRect(0,0,1920,1080);
      const hex = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#c4973a';
      pts.forEach(p => {
        p.x+=p.vx; p.y+=p.vy; p.a+=p.da;
        if (p.a<.03||p.a>.48) p.da*=-1;
        if (p.x<0) p.x=1920; if (p.x>1920) p.x=0;
        if (p.y<-5) p.y=1085; if (p.y>1085) p.y=-5;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle=hex; ctx.globalAlpha=p.a; ctx.fill();
      });
      ctx.globalAlpha=1; requestAnimationFrame(loop);
    }
    loop();
  }

  document.addEventListener('DOMContentLoaded', () => { startClock(); initParticles(); });
  onValue(ref(db,'config'),  snap => { configData = snap.val()||{}; render(configData, votesData); });
  onValue(ref(db,'sessions'),snap => { votesData  = snap.val()||{}; if (configData) render(configData, votesData); });
</script>

<style>
  :root { --accent:#c4973a; --accent2:#e8d5a3; --bg:#06050f; }
  *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: #ede9e0;
    font-family: 'Jost', sans-serif;
    width: 1920px; height: 1080px;
    overflow: hidden; position: relative;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── BG STACK ─── */
  canvas#pc { position:absolute; inset:0; z-index:0; pointer-events:none; opacity:.65; }

  .bg-mesh {
    position:absolute; inset:0; z-index:1; pointer-events:none;
    background:
      radial-gradient(ellipse 90% 70% at 105% -15%, color-mix(in srgb,var(--accent) 16%,transparent), transparent 54%),
      radial-gradient(ellipse 55% 55% at -8% 110%,  color-mix(in srgb,var(--accent)  7%,transparent), transparent 55%),
      radial-gradient(ellipse 35% 35% at 42%  48%,  color-mix(in srgb,var(--accent)  4%,transparent), transparent 65%);
  }
  .vignette {
    position:absolute; inset:0; z-index:2; pointer-events:none;
    background: radial-gradient(ellipse 130% 110% at 50% 50%, transparent 38%, rgba(0,0,0,.58) 100%);
  }
  .scanlines {
    position:absolute; inset:0; z-index:3; pointer-events:none; opacity:.024;
    background: repeating-linear-gradient(0deg,transparent 0,transparent 3px,rgba(0,0,0,1) 3px,rgba(0,0,0,1) 4px);
  }
  #voteFlash {
    position:absolute; inset:0; z-index:4; pointer-events:none;
    background: radial-gradient(ellipse 65% 65% at 50% 50%, color-mix(in srgb,var(--accent) 16%,transparent),transparent);
    opacity:0; transition:opacity .09s;
  }
  #voteFlash.active { opacity:1; transition:opacity 0s; }

  /* ─── CORNER BRACKETS ─── */
  .brk { position:absolute; z-index:7; width:22px; height:22px; }
  .brk-tl { top:18px;  left:18px;  border-top:1px solid color-mix(in srgb,var(--accent) 32%,transparent); border-left:1px solid color-mix(in srgb,var(--accent) 32%,transparent); }
  .brk-tr { top:18px;  right:18px; border-top:1px solid color-mix(in srgb,var(--accent) 32%,transparent); border-right:1px solid color-mix(in srgb,var(--accent) 32%,transparent); }
  .brk-bl { bottom:60px; left:18px;  border-bottom:1px solid color-mix(in srgb,var(--accent) 32%,transparent); border-left:1px solid color-mix(in srgb,var(--accent) 32%,transparent); }
  .brk-br { bottom:60px; right:18px; border-bottom:1px solid color-mix(in srgb,var(--accent) 32%,transparent); border-right:1px solid color-mix(in srgb,var(--accent) 32%,transparent); }

  /* ─── STAGE ─── */
  .stage {
    position:relative; z-index:5;
    width:1920px; height:1028px; /* minus chrome bar */
    display:grid;
    grid-template-columns: 490px 1fr;
  }

  /* ════════════════════
     LEFT COL
  ════════════════════ */
  .left-col {
    display:flex; flex-direction:column;
    padding: 48px 0 40px 52px;
    position:relative;
  }
  /* Vertical separator */
  .left-col::after {
    content:''; position:absolute; right:0; top:72px; bottom:72px; width:1px;
    background:linear-gradient(180deg,transparent,color-mix(in srgb,var(--accent) 28%,transparent) 25%,color-mix(in srgb,var(--accent) 28%,transparent) 75%,transparent);
  }

  .brand-row { display:flex; align-items:center; gap:12px; margin-bottom:44px; }
  .brand-gem {
    width:8px; height:8px; background:var(--accent);
    transform:rotate(45deg); opacity:.75; flex-shrink:0;
  }
  .brand-text {
    font-family:'Cinzel',serif; font-size:.72rem; font-weight:600;
    letter-spacing:.28em; text-transform:uppercase; color:var(--accent); opacity:.75;
  }

  /* Live indicator */
  .live-row { display:flex; align-items:center; gap:10px; margin-bottom:36px; }
  .live-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .live-dot.on  { background:#4fdb82; box-shadow:0 0 0 4px rgba(79,219,130,.2); animation:livePulse 2.2s ease infinite; }
  .live-dot.off { background:#dd4444; }
  @keyframes livePulse {
    0%,100% { box-shadow:0 0 0 3px rgba(79,219,130,.18); }
    50%      { box-shadow:0 0 0 8px rgba(79,219,130,0); }
  }
  .status-tag {
    font-size:.62rem; font-weight:600; letter-spacing:.2em; text-transform:uppercase;
    padding:4px 14px; border-radius:100px;
  }
  .status-tag.live   { background:rgba(79,219,130,.1); color:#4fdb82; border:1px solid rgba(79,219,130,.24); }
  .status-tag.closed { background:rgba(200,80,80,.1);  color:#dd4444; border:1px solid rgba(200,80,80,.2); }

  .event-block { flex:1; display:flex; flex-direction:column; justify-content:center; }

  .eyebrow {
    font-size:.62rem; font-weight:500; letter-spacing:.25em; text-transform:uppercase;
    color:var(--accent); opacity:.58; margin-bottom:14px;
  }

  #evTitle {
    font-family:'Cinzel',serif;
    font-size:3.6rem; font-weight:900;
    line-height:.97; letter-spacing:.01em;
    color:#ede9e0; margin-bottom:16px;
    text-shadow: 0 0 90px color-mix(in srgb,var(--accent) 32%,transparent), 0 2px 0 rgba(0,0,0,.5);
  }

  #evSub {
    font-size:.95rem; font-weight:300; font-style:italic;
    color:var(--accent); letter-spacing:.05em; opacity:.82;
    margin-bottom:44px; min-height:1.4em;
  }

  /* Counter box */
  .counter-box {
    background: color-mix(in srgb,var(--accent) 7%,rgba(255,255,255,.02));
    border:1px solid color-mix(in srgb,var(--accent) 22%,transparent);
    border-radius:16px; padding:22px 26px;
    position:relative; overflow:hidden; margin-bottom:20px;
  }
  .counter-box::before {
    content:''; position:absolute; top:0; left:0; right:0; height:1px;
    background:linear-gradient(90deg,transparent,var(--accent) 35%,var(--accent) 65%,transparent);
    opacity:.65; animation:shimLine 4s linear infinite; background-size:200% 100%;
  }
  @keyframes shimLine { 0%{background-position:-100% 0} 100%{background-position:200% 0} }

  .counter-label {
    font-size:.6rem; font-weight:600; letter-spacing:.22em; text-transform:uppercase;
    color:var(--accent); opacity:.58; margin-bottom:8px;
  }
  #totalVotesDisplay {
    font-family:'Cinzel',serif; font-size:4.8rem; font-weight:900;
    color:var(--accent); line-height:1; letter-spacing:-.01em;
    text-shadow:0 0 70px color-mix(in srgb,var(--accent) 38%,transparent);
  }
  .counter-footer { font-size:.65rem; color:#4a4558; letter-spacing:.07em; margin-top:6px; }

  /* Clock */
  .clock-line { display:flex; align-items:center; gap:9px; }
  .clock-gem { width:4px; height:4px; background:var(--accent); transform:rotate(45deg); opacity:.35; }
  .live-clock { font-family:'Cinzel',serif; font-size:.78rem; letter-spacing:.14em; color:#4a4558; }

  /* ════════════════════
     RIGHT COL
  ════════════════════ */
  .right-col {
    display:flex; flex-direction:column;
    padding:48px 52px 40px 44px; gap:16px;
  }

  /* ─── HERO CARD ─── */
  .hero-card {
    flex-shrink:0;
    display:grid;
    grid-template-columns:auto 1fr;
    grid-template-rows:auto auto;
    column-gap:26px;
    background: color-mix(in srgb,var(--accent) 9%,rgba(255,255,255,.025));
    border:1px solid color-mix(in srgb,var(--accent) 30%,transparent);
    border-radius:20px; padding:20px 26px;
    position:relative; overflow:hidden;
    box-shadow: 0 0 70px -20px color-mix(in srgb,var(--accent) 28%,transparent);
  }
  /* Shimmering top edge */
  .hero-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,transparent,var(--accent) 25%,var(--accent2) 50%,var(--accent) 75%,transparent);
    background-size:200% 100%;
    animation:shimCard 3.5s linear infinite;
  }
  @keyframes shimCard { 0%{background-position:-100% 0} 100%{background-position:200% 0} }
  /* Glow blob */
  .hero-card::after {
    content:''; position:absolute; right:-60px; top:-60px;
    width:240px; height:240px; border-radius:50%;
    background:radial-gradient(circle,color-mix(in srgb,var(--accent) 12%,transparent),transparent 70%);
    pointer-events:none;
  }

  /* photo */
  .hero-photo-col {
    grid-column:1; grid-row:1/3;
    display:flex; flex-direction:column; align-items:center; gap:10px;
  }
  .hero-place {
    font-size:.56rem; font-weight:600; letter-spacing:.22em; text-transform:uppercase;
    color:var(--accent); opacity:.6;
  }
  .hero-photo {
    width:118px; height:118px; border-radius:14px; overflow:hidden;
    border:2px solid color-mix(in srgb,var(--accent) 38%,transparent);
    box-shadow:0 8px 40px -8px color-mix(in srgb,var(--accent) 32%,transparent);
    background:rgba(255,255,255,.04); position:relative; flex-shrink:0;
  }
  #heroImg  { width:100%; height:100%; object-fit:cover; display:none; }
  #heroInitial {
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    font-family:'Cinzel',serif; font-size:2.8rem; font-weight:900;
    color:var(--accent); opacity:.22;
  }
  .hero-photo::after {
    content:''; position:absolute; inset:-7px; border-radius:19px;
    border:1px solid color-mix(in srgb,var(--accent) 18%,transparent);
    animation:ringPulse 3.2s ease infinite;
  }
  @keyframes ringPulse { 0%,100%{opacity:.35;transform:scale(1)} 50%{opacity:.9;transform:scale(1.04)} }

  /* hero text */
  .hero-info { grid-column:2; grid-row:1; align-self:center; padding-bottom:8px; }
  .hero-badge {
    font-size:.58rem; font-weight:600; letter-spacing:.2em; text-transform:uppercase;
    color:var(--accent); opacity:.55; margin-bottom:8px;
  }
  #heroName {
    font-family:'Cinzel',serif; font-size:1.9rem; font-weight:900;
    color:var(--accent2); line-height:1.05; letter-spacing:.02em;
    text-shadow:0 0 40px color-mix(in srgb,var(--accent) 32%,transparent);
    margin-bottom:5px;
  }
  #heroSub {
    font-size:.74rem; letter-spacing:.08em; text-transform:uppercase;
    color:var(--accent); opacity:.62;
  }

  /* hero stats */
  .hero-metrics { grid-column:2; grid-row:2; }
  .hero-nums { display:flex; align-items:baseline; gap:18px; margin-bottom:10px; }
  #heroVotes {
    font-family:'Cinzel',serif; font-size:2.5rem; font-weight:900; color:var(--accent);
    text-shadow:0 0 30px color-mix(in srgb,var(--accent) 42%,transparent); line-height:1;
  }
  .hero-vl { font-size:.65rem; letter-spacing:.1em; text-transform:uppercase; color:#4a4558; }
  #heroPct { font-family:'Cinzel',serif; font-size:1.35rem; font-weight:600; color:color-mix(in srgb,var(--accent) 68%,transparent); }

  .hero-bar-track { height:5px; background:rgba(255,255,255,.06); border-radius:5px; overflow:hidden; }
  #heroBar {
    height:100%; width:0; border-radius:5px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));
    transition:width 1.1s cubic-bezier(.22,1,.36,1);
    box-shadow:0 0 14px color-mix(in srgb,var(--accent) 55%,transparent);
  }

  /* section divider */
  .sec-div { display:flex; align-items:center; gap:12px; flex-shrink:0; }
  .sec-div span {
    font-size:.58rem; font-weight:600; letter-spacing:.2em; text-transform:uppercase;
    color:var(--accent); opacity:.48; white-space:nowrap;
  }
  .sec-div::after { content:''; flex:1; height:1px; background:color-mix(in srgb,var(--accent) 14%,transparent); }

  /* ─── LEADERBOARD ─── */
  #leaderboard { flex:1; display:flex; flex-direction:column; gap:7px; overflow:hidden; }

  .lb-row {
    display:flex; align-items:center; gap:12px;
    background:rgba(255,255,255,.022);
    border:1px solid rgba(255,255,255,.04);
    border-radius:11px; padding:10px 15px;
    animation:lbIn .45s calc(var(--i,0)*.06s) cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes lbIn { from{opacity:0;transform:translateX(22px)} to{opacity:1;transform:none} }

  .lb-rank {
    font-family:'Cinzel',serif; font-size:.7rem; font-weight:600;
    color:#3e3a4e; letter-spacing:.06em; width:24px; text-align:center; flex-shrink:0;
  }
  .lb-photo { width:46px; height:46px; border-radius:8px; overflow:hidden; flex-shrink:0; background:rgba(255,255,255,.04); }
  .lb-photo img { width:100%; height:100%; object-fit:cover; }
  .lb-initial {
    width:100%; height:100%; display:flex; align-items:center; justify-content:center;
    font-family:'Cinzel',serif; font-size:1.2rem; font-weight:700; color:var(--accent); opacity:.2;
  }
  .lb-info { flex:1; min-width:0; }
  .lb-name {
    font-family:'Cinzel',serif; font-size:.9rem; font-weight:600;
    color:#cec9c0; margin-bottom:2px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .lb-sub { font-size:.6rem; letter-spacing:.06em; text-transform:uppercase; color:#3e3a4e; margin-bottom:7px; }
  .lb-track { height:3px; background:rgba(255,255,255,.05); border-radius:3px; overflow:hidden; }
  .lb-fill {
    height:100%; width:0;
    background:linear-gradient(90deg,color-mix(in srgb,var(--accent) 65%,transparent),var(--accent));
    border-radius:3px; transition:width .85s cubic-bezier(.22,1,.36,1);
  }
  .lb-right { text-align:right; flex-shrink:0; min-width:68px; }
  .lb-votes { font-family:'Cinzel',serif; font-size:1rem; font-weight:700; color:var(--accent); }
  .lb-pct   { font-size:.62rem; color:#3e3a4e; letter-spacing:.05em; margin-top:2px; }

  /* ════════════════════
     CHROME BAR (bottom)
  ════════════════════ */
  .chrome-bar {
    position:absolute; bottom:0; left:0; right:0; z-index:6;
    height:52px;
    background:color-mix(in srgb,var(--bg) 88%,transparent);
    border-top:1px solid color-mix(in srgb,var(--accent) 13%,transparent);
    backdrop-filter:blur(10px);
    display:flex; align-items:center;
    padding:0 52px;
  }
  .chrome-left  { display:flex; align-items:center; gap:18px; }
  .chrome-brand { font-family:'Cinzel',serif; font-size:.6rem; font-weight:600; letter-spacing:.26em; text-transform:uppercase; color:var(--accent); opacity:.65; }
  .chrome-pipe  { width:1px; height:14px; background:color-mix(in srgb,var(--accent) 20%,transparent); }
  .chrome-url   { font-size:.6rem; letter-spacing:.1em; color:#3e3a4e; }
  .chrome-mid   { flex:1; text-align:center; font-size:.58rem; letter-spacing:.18em; text-transform:uppercase; color:#3e3a4e; }
  .chrome-right { display:flex; align-items:center; gap:8px; }
  .chrome-clockdot { width:4px; height:4px; border-radius:50%; background:#3e3a4e; opacity:.5; }
  .chrome-clock { font-family:'Cinzel',serif; font-size:.7rem; letter-spacing:.12em; color:#3e3a4e; }
</style>
</head>
<body>

<!-- BG LAYERS -->
<canvas id="pc"></canvas>
<div class="bg-mesh"></div>
<div class="vignette"></div>
<div class="scanlines"></div>
<div id="voteFlash"></div>

<!-- BRACKETS -->
<div class="brk brk-tl"></div>
<div class="brk brk-tr"></div>
<div class="brk brk-bl"></div>
<div class="brk brk-br"></div>

<!-- STAGE -->
<div class="stage">

  <!-- ══ LEFT ══ -->
  <div class="left-col">
    <div class="brand-row">
      <div class="brand-gem"></div>
      <div class="brand-text">Grupo Armindo</div>
    </div>

    <div class="live-row">
      <div class="live-dot on" id="liveDot"></div>
      <span class="status-tag live" id="statusTag">AO VIVO</span>
    </div>

    <div class="event-block">
      <div class="eyebrow">Votação em Tempo Real</div>
      <div id="evTitle">A CARREGAR</div>
      <div id="evSub"></div>

      <div class="counter-box">
        <div class="counter-label">Votos Registados</div>
        <div id="totalVotesDisplay">0</div>
        <div class="counter-footer">Actualizado em tempo real</div>
      </div>

      <div class="clock-line">
        <div class="clock-gem"></div>
        <span class="live-clock">00:00:00</span>
      </div>
    </div>
  </div>

  <!-- ══ RIGHT ══ -->
  <div class="right-col">

    <!-- HERO -->
    <div class="hero-card">
      <div class="hero-photo-col">
        <div class="hero-place">1.º Lugar</div>
        <div class="hero-photo">
          <img id="heroImg" src="" alt=""/>
          <div id="heroInitial"></div>
        </div>
      </div>

      <div class="hero-info">
        <div class="hero-badge">LÍDER ◆ CLASSIFICAÇÃO</div>
        <div id="heroName">—</div>
        <div id="heroSub"></div>
      </div>

      <div class="hero-metrics">
        <div class="hero-nums">
          <div id="heroVotes">0</div>
          <div class="hero-vl">votos</div>
          <div id="heroPct">0%</div>
        </div>
        <div class="hero-bar-track"><div id="heroBar"></div></div>
      </div>
    </div>

    <!-- DIVIDER -->
    <div class="sec-div"><span>Classificação Geral</span></div>

    <!-- LEADERBOARD -->
    <div id="leaderboard"></div>

  </div>
</div>

<!-- CHROME BAR -->
<div class="chrome-bar">
  <div class="chrome-left">
    <span class="chrome-brand">Grupo Armindo</span>
    <div class="chrome-pipe"></div>
    <span class="chrome-url">vote.grupoarmindo.me</span>
  </div>
  <div class="chrome-mid">Resultados em Tempo Real</div>
  <div class="chrome-right">
    <div class="chrome-clockdot"></div>
    <span class="chrome-clock live-clock">00:00:00</span>
  </div>
</div>

</body>
</html>
