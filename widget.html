<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Widget Cilindro — Premium Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;900&display=swap" rel="stylesheet"/>

<style>
  :root {
    --accent: #FF3EDE;
    --text: #ffffff;
    --font-main: 'Outfit', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: transparent;
    color: var(--text);
    font-family: var(--font-main);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }

  /* O Cilindro / Pill */
  .pill-container {
    position: relative;
    border-radius: 1000px;
    background: rgba(0, 0, 0, 0.5);
    backdrop-filter: blur(30px);
    display: flex;
    align-items: center;
    justify-content: center;
    min-width: 320px;
    height: 140px;
    box-shadow: 0 30px 60px rgba(0,0,0,0.6);
    /* Borda estática sempre visível */
    border: 2px solid rgba(255, 255, 255, 0.15);
    transition: border-color 0.3s;
  }

  /* O rasto de luz que dá a volta */
  .border-streak {
    position: absolute;
    inset: -2px; /* Alinhado com a borda real */
    border-radius: 1000px;
    padding: 2px; /* Espessura do rasto */
    background: conic-gradient(from 0deg, var(--accent), transparent 30%, transparent 70%, var(--accent));
    -webkit-mask: 
       linear-gradient(#fff 0 0) content-box, 
       linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
            mask-composite: exclude;
    opacity: 0;
    pointer-events: none;
    z-index: 2;
  }

  .border-streak.animate {
    animation: streakRotate 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }

  @keyframes streakRotate {
    0% { transform: rotate(0deg); opacity: 0; }
    15% { opacity: 1; }
    85% { opacity: 1; }
    100% { transform: rotate(360deg); opacity: 0; }
  }

  /* Conteúdo */
  .pill-content {
    display: flex;
    align-items: baseline;
    gap: 14px;
    z-index: 5;
    padding: 0 40px;
  }

  #totalVotes {
    font-size: 5.5rem;
    font-weight: 950;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.04em;
    transition: all 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.49);
    text-shadow: 0 8px 25px rgba(0,0,0,0.5);
  }

  #totalVotes.pop {
    transform: scale(1.18);
    color: var(--accent);
    text-shadow: 0 0 30px color-mix(in srgb, var(--accent) 50%, transparent);
  }

  .label {
    font-size: 1.2rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    opacity: 0.8;
    color: var(--text);
    transform: translateY(-8px);
  }
</style>
</head>
<body>

<div class="pill-container">
  <div class="border-streak" id="streak"></div>
  <div class="pill-content">
    <div id="totalVotes">0</div>
    <div class="label">VOTOS</div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA8azNy6GEgD190y_fW91ahUbKa1w5veik",
    authDomain: "aawards.firebaseapp.com",
    databaseURL: "https://aawards-default-rtdb.firebaseio.com",
    projectId: "aawards",
    storageBucket: "aawards.firebasestorage.app",
    messagingSenderId: "839334918366",
    appId: "1:839334918366:web:454a259fa3e2665b46ea4f"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let lastTotal = -1;

  onValue(ref(db, 'config/theme'), snap => {
    const theme = snap.val();
    if (theme && theme.accent) {
      document.documentElement.style.setProperty('--accent', theme.accent);
    }
  });

  onValue(ref(db, 'votes'), (snap) => {
    const votes = snap.val() || {};
    const total = Object.values(votes).reduce((a, b) => a + b, 0);
    const el = document.getElementById('totalVotes');
    const streak = document.getElementById('streak');
    
    if (total !== lastTotal) {
      el.textContent = total.toLocaleString();
      
      if (lastTotal !== -1 && total > lastTotal) {
        // Pop Number
        el.classList.remove('pop');
        void el.offsetWidth;
        el.classList.add('pop');
        setTimeout(() => el.classList.remove('pop'), 500);

        // Spin Streak
        streak.classList.remove('animate');
        void streak.offsetWidth;
        streak.classList.add('animate');
      }
      
      lastTotal = total;
    }
  });
</script>
</body>
</html>
